access: 3rd-Party
created: '2026-05-25'
modified: '2026-05-25'
position: Consumer
description: >-
  Sendcloud is Europe's leading shipping platform for e-commerce, headquartered in Eindhoven, Netherlands. The platform
  connects 30,000+ merchants to 160+ carriers (DHL, DPD, UPS, GLS, FedEx, PostNL, bpost, La Poste, Royal Mail, Hermes,
  and many more) and 100+ commerce / WMS / marketplace integrations across the UK, Netherlands, Belgium, France,
  Germany, Austria, Italy, and Spain. The Sendcloud APIs cover the full fulfillment lifecycle — Orders, Ship an Order,
  Shipments, Service Points, Parcel Tracking, Parcel Documents, Returns, Event Subscriptions, Webhooks, Integrations,
  Analytics, and Reporting — over a versioned v2 / v3 REST surface on https://panel.sendcloud.sc, authenticated with
  HTTP Basic (public + private key) or OAuth 2.0 client credentials.

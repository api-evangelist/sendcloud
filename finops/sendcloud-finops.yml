specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sendcloud
providerId: sendcloud
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Shipping API
description: FOCUS-aligned FinOps mapping for Sendcloud subscription + per-label billing.
sources:
  - https://www.sendcloud.com/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sendcloud
serviceCategory: Shipping API
billingModel:
  pricingCategory: Subscription + Per-Label + Pass-Through Carrier Rates
  billingFrequency: Monthly
  billingCurrency: EUR
focusColumns:
  ServiceName: Sendcloud
  ServiceCategory: Shipping API
  ProviderName: Sendcloud
  PublisherName: Sendcloud
  BillingCurrency: EUR
meters:
  - name: subscription_fee
    unit: month
    aggregation: sum
  - name: labels_included
    unit: label
    aggregation: sum
    dimensions:
      - carrier
      - shipping_method
  - name: labels_overage
    unit: label
    aggregation: sum
    dimensions:
      - carrier
      - shipping_method
  - name: carrier_postage
    unit: shipment
    aggregation: sum
    dimensions:
      - carrier
      - service
      - weight_band
      - origin_country
      - destination_country
  - name: returns_processed
    unit: return
    aggregation: sum
  - name: integration_seats
    unit: integration
    aggregation: max
principles:
  - name: Visibility
    description: Track Sendcloud monthly subscription, label overage, and pass-through carrier postage.
  - name: Allocation
    description: Tag shipments to shops, brands, marketplaces, or cost centres.
  - name: Optimization
    description: Re-route shipments by carrier price band; right-size subscription tier.
  - name: Accountability
    description: Set per-shop label budgets and alert on overage thresholds.

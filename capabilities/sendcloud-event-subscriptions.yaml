naftiko: 1.0.0-alpha2
info:
  label: Sendcloud API — Event Subscriptions
  description: 'Sendcloud API v3 — Event Subscriptions. Manage typed webhook subscriptions and delivery connections.'
  tags:
  - Sendcloud
  - Webhooks
  - Events
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SENDCLOUD_PUBLIC_KEY: SENDCLOUD_PUBLIC_KEY
    SENDCLOUD_PRIVATE_KEY: SENDCLOUD_PRIVATE_KEY
capability:
  consumes:
  - type: http
    namespace: sendcloud-event-subscriptions
    baseUri: https://panel.sendcloud.sc/api/v3
    description: Sendcloud Event Subscriptions API v3.
    resources:
    - name: connections
      path: /event-subscriptions/connections
      operations:
      - name: listconnections
        method: GET
        description: List webhook delivery connections.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createconnection
        method: POST
        description: Create a webhook delivery connection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: connections-id
      path: /event-subscriptions/connections/{id}
      operations:
      - name: retrieveconnection
        method: GET
        description: Retrieve a connection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deleteconnection
        method: DELETE
        description: Delete a connection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: subscriptions
      path: /event-subscriptions/subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List typed event subscriptions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsubscription
        method: POST
        description: Create an event subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: subscriptions-id
      path: /event-subscriptions/subscriptions/{id}
      operations:
      - name: retrievesubscription
        method: GET
        description: Retrieve an event subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletesubscription
        method: DELETE
        description: Delete an event subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.SENDCLOUD_PUBLIC_KEY}}'
      password: '{{env.SENDCLOUD_PRIVATE_KEY}}'
  exposes:
  - type: mcp
    namespace: sendcloud-event-subscriptions-mcp
    port: 9096
    transport: http
    description: MCP adapter for Sendcloud Event Subscriptions.
    tools:
    - name: list-connections
      description: List webhook delivery connections.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sendcloud-event-subscriptions.listconnections
      outputParameters:
      - type: object
        mapping: $.
    - name: create-connection
      description: Create a webhook delivery connection.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sendcloud-event-subscriptions.createconnection
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-subscriptions
      description: List typed event subscriptions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sendcloud-event-subscriptions.listsubscriptions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription
      description: Create an event subscription.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sendcloud-event-subscriptions.createsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-subscription
      description: Delete an event subscription.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sendcloud-event-subscriptions.deletesubscription
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.

specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sendcloud
providerId: sendcloud
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - Rate Limiting
  - Shipping
description: Sendcloud REST API rate limits split by HTTP method safety class.
sources:
  - https://sendcloud.dev/docs/getting-started/rate-limits/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Safe requests (GET)
    scope: integration
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
  - name: Unsafe requests (POST/PATCH/PUT/DELETE)
    scope: integration
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Unsafe burst allowance
    scope: integration
    metric: concurrent_requests
    limit: 15
    timeFrame: second

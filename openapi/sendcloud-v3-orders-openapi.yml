          description: >-
            Node for service point information. The service point information
            can be retrieved using the [Service points
            API](/api/v2/service-points).


            You must provide either the Sendcloud `id` or the
            `carrier_service_point_id` to identify the service point.


            > **Note:** The Service Points API is currently only available in
            API v2. This reference will be updated when a v3 version becomes
            available.
          oneOf:
            - title: Sendcloud ID
              type: object
              properties:
                id:
                  type: string
                  description: >-
                    An id of Sendcloud Service Point to which the shipment is
                    going to be shipped
                  example: '123'
                post_number:
                  type: string
                  description: >-
                    An optional field that only applies to PackStation service
                    point types
                  example: some-post-number
                latitude:
                  type: string
                  description: The Latitude of where the service point is located
                  example: '51.427063'
                longitude:
                  type: string
                  description: The Longitude of where the service point is located
                  example: '5.486414'
                type:
                  type: string
                  description: Carrier defined service point type
                  example: packstation
                extra_data:
                  type: object
                  description: Can contain carrier specific data
              required:
                - id
            - title: Carrier Service Point ID
              type: object
              properties:
                carrier_service_point_id:
                  type: string
                  description: The carrier's native id for the service point
                  example: '91233'
                post_number:
                  type: string
                  description: >-
                    An optional field that only applies to PackStation service
                    point types
                  example: some-post-number
                latitude:
                  type: string
                  description: The Latitude of where the service point is located
                  example: '51.427063'
                longitude:
                  type: string
                  description: The Longitude of where the service point is located
                  example: '5.486414'
                type:
                  type: string
                  description: Carrier defined service point type
                  example: packstation
                extra_data:
                  type: object
                  description: Can contain carrier specific data
              required:
                - carrier_service_point_id
  parameters:
    integration:
      in: query
      name: integration
      description: >-
        Filter orders by one or more integration IDs. Use a comma separated
        list, e.g. `integration=41,68,419`.


        You can get your integration IDs from the [Retrieve a list of
        integrations](/api/v3/integrations/retrieve-a-list-of-integrations)
        endpoint.
      schema:
        type: integer
        example: 17
    order_number:
      in: query
      name: order_number
      description: >-
        Filter orders by a specific order number, e.g.
        `order_number=ORDER_284565`. The filtering is case insensitive.
      schema:
        type: string
        example: ORDER_284565
    order_id:
      in: query
      name: order_id
      description: >-
        Filter orders by a specific order id, e.g.
        `order_id=1896e94b-c01b-4e73-a9e7-57f51c8a4c77`. The filtering is case
        insensitive.
      schema:
        type: string
        example: 1896e94b-c01b-4e73-a9e7-57f51c8a4c77
    order_status:
      in: query
      name: status
      description: >-
        Filter orders based on their status, e.g. `status=unshipped`. The
        filtering is case insensitive.
      schema:
        type: string
        example: unshipped
    order_created_at:
      in: query
      name: order_created_at
      description: >-
        Find orders that were created on a specific date, e.g.
        `order_created_at=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    order_created_at_min:
      in: query
      name: order_created_at_min
      description: >-
        Find orders that were created at or after a specific date, e.g.
        `order_created_at_min=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    order_created_at_max:
      in: query
      name: order_created_at_max
      description: >-
        Find orders that were created at or before a specific date, e.g.
        `order_created_at_max=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    order_updated_at:
      in: query
      name: order_updated_at
      description: >-
        Find orders that were updated on a specific date, e.g.
        `order_updated_at=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    order_updated_at_min:
      in: query
      name: order_updated_at_min
      description: >-
        Find orders that were updated at or after a specific date, e.g.
        `order_updated_at_min=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    order_updated_at_max:
      in: query
      name: order_updated_at_max
      description: >-
        Find orders that were updated at or before a specific date, e.g.
        `order_updated_at_max=2023-04-28`.
      schema:
        type: string
        format: date
        example: '2023-04-28'
    sort:
      in: query
      name: sort
      description: >-
        Sort the orders in the response by using one or more of the following
        values:
         - `integration`: Sort by the integration ID of the retrieved orders; to sort in descending order, use `-integration`
         - `order_number`: Sort by the order number of the retrieved orders; to sort in descending order, use `-order_number`.
         - `order_created_at`: Sort by the date of an order creation of the retrieved orders; to sort in descending order, use `-order_created_at`
         - `order_updated_at`: Sort by the date of an order update of the retrieved orders; to sort in descending order, use `-order_updated_at`
         - `pk`: Sort by the ID (autogenerated internal ID) of the retrieved orders; to sort in descending order, use `-pk`

        Additional information about this query:
         - Any valid combination of the above values is supported, e.g. `sort=integration,-order_created_at`. 
         - In case of conflicting `sort` values, e.g. `/?sort=integration,-integration`, the conflicting value will be ignored.
         - If the `sort` query parameter is not set, the sorting of the retrieved orders will default to `-pk`.
         - If an unsupported `sort` value is provided, the results will be sorted by the default (`-pk`).
      schema:
        type: string
        example: '-order_number'
    page_size:
      in: query
      name: page_size
      schema:
        type: number
        default: 100
        maximum: 200
        minimum: 1
        example: 150
      description: The maximum number of results to be returned per page
    cursor:
      in: query
      name: cursor
      description: >-
        The cursor query string is used as the pivot value to filter results. If
        no value is provided, the first page of results will be returned. To get
        this value, you must encode the offset, reverse and position into a
        base64 string.


        There are 3 possible parameters to encode:
          - `o`: Offset
          - `r`: Reverse
          - `p`: Position
          
        For example, `r=1&p=300` encoded as a base64 string would be
        `cj0xJnA9MzAw`. The query string would then be `cursor=cj0xJnA9MzAw`.
      schema:
        type: string
        example: cj0xJnA9MzAw
    SendcloudPartnerId:
      in: header
      name: Sendcloud-Partner-Id
      description: >-
        If you are an official [Sendcloud Tech
        Partner](https://www.sendcloud.com/ecosystem/), send your unique
        Sendcloud Partner UUID as a request header for the system to recognize
        you.


        The header is not required but if it is set, the system will check it.
        An unknown or invalid UUID will cause a 400 error.
      schema:
        type: string
  securitySchemes:
    HTTPBasicAuth:
      type: http
      description: >-
        Basic Authentication using API key and secrets is currently the main
        authentication mechanism.
      scheme: basic
    OAuth2ClientCreds:
      type: oauth2
      description: >-
        OAuth2 is a standardized protocol for authorization that allows users to
        share their private resources stored on one site with another site
        without having to provide their credentials. OAuth2 Client Credentials
        Grant workflow. This workflow is typically used for server-to-server
        interactions that require authorization to access specific resources.
      flows:
        clientCredentials:
          tokenUrl: https://account.sendcloud.com/oauth2/token/
          scopes:
            api: Default OAuth scope required to access Sendcloud API.
  responses:
    Unauthorized:
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errors'
          examples:
            InvalidCredentials:
              summary: Invalid Credentials
              value:
                errors:
                  - status: '401'
                    code: authentication_failed
                    title: Invalid username/password.
                    detail: >-
                      The username or password provided is incorrect. Please
                      make a request with the valid credentials.
            AuthenticationRequired:
              value:
                errors:
                  - status: '401'
                    code: authentication_failed
                    title: No credentials
                    detail: Authentication credentials were not provided.
    OrderUpdated:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                description: Create/Update orders in batch response object
                properties:
                  id:
                    description: Autogenerated Sendcloud's internal ID
                    type: integer
                    example: 234543
                  order_id:
                    type: string
                    description: External order ID assigned by shop system
                    example: 7bdd5bfd-76bc-4654-9d40-5d5d49f1cd6c
                  order_number:
                    type: string
                    description: Unique order number generated manually or by shop system
                    example: '101170081'
          examples:
            UpdateOrder:
              summary: Update an Order
              value:
                data:
                  id: 669
                  order_id: '555413'
                  order_number: OXSDFGHTD-12

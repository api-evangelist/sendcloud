openapi: 3.1.0
info:
  title: Orders
  version: 3.0.0
  contact:
    name: Sendcloud API Support
    email: contact@sendcloud.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: >-
    The Orders API lets you manage your orders within Sendcloud. You can create
    and update orders in batch, retrieve a list of orders per integration,
    retrieve an order, partially update an order, and delete an order.
servers:
  - url: https://panel.sendcloud.sc/api/v3
    description: Sendcloud Production
tags:
  - name: Orders
    description: OrderAPI
paths:
  /orders:
    post:
      summary: Create/Update orders in batch
      description: Use this endpoint to insert orders into a Sendcloud API integration.
      x-mint:
        href: /api/v3/orders/create-update-orders-in-batch
        content: >-
          Each order can have a different integration id, so you can
          create/update orders for multiple integrations in one request.


          ## Upsert behavior


          This is an **upsert** endpoint, which means:

            - If an order with the same `order_id` and `integration.id` combination **already exists**, it will be **updated**
            - If no matching order exists, a **new order will be created**
            - **Optional**: You can include the Sendcloud `id` field to explicitly update a specific order
              - **Important**: When returned in responses, `id` is an **integer**, but when sending it in requests, it must be a **string**
              - Example: Response returns `"id": 669`, but request must send `"id": "669"`

          ## Batch processing


          - Process multiple orders in a single request (up to **100 orders
          maximum**)

          - Orders from different integrations can be included in the same batch

          - **All-or-nothing transaction**: If any order in the batch fails
          validation, the entire batch is rejected and zero orders are created
          or updated. There is no partial success — either all orders are
          processed or none are

          - On failure (HTTP 400), the response includes error details with
          `source.pointer` indicating which order in the array caused the issue
          (e.g., `[1]` for the second order, 0-indexed)

          - If you send multiple orders and one fails, you need to fix the
          failing order and resubmit the entire batch


          ## Limitations and constraints


          - **Maximum batch size**: 100 orders per request

          - **Upsert matching**: Orders are matched by the combination of
          `order_id` + `integration.id`

          - **Immutable fields**: When updating existing orders, certain fields
          like `order_id` cannot be changed

          - **Concurrent processing**: If the same `order_id` is being processed
          by another request, you'll receive a conflict error. Wait a moment and
          retry

          - **Integration access**: You can only create/update orders for
          integrations that belong to your account


          ## Asynchronous processing


          Order saving happens **asynchronously**. A successful `201` response
          means the request was accepted, but the order may not be immediately
          available for other operations (e.g., creating a label via the [Ship
          an Order API](/api/v3/ship-an-order)).


          - After creating an order, **verify it exists** by retrieving it with
          the [Retrieve an order](/api/v3/orders/retrieve-an-order) endpoint
          before attempting to ship it

          - If you plan to create an order and immediately ship it, allow a
          short delay and confirm the order is available before calling the Ship
          an Order API


          ## Best practices


          - Ensure all required fields are present before sending the request

          - Handle errors gracefully and implement retry logic for transient
          failures

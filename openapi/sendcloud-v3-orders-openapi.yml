      responses:
        '201':
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      description: Create/Update orders in batch response object.
                      properties:
                        id:
                          description: Autogenerated Sendcloud's internal ID
                          type: integer
                          example: 234543
                        order_id:
                          type: string
                          description: External order ID assigned by shop system
                          example: 7bdd5bfd-76bc-4654-9d40-5d5d49f1cd6c
                        order_number:
                          type: string
                          description: >-
                            Unique order number generated manually or by shop
                            system
                          example: '101170081'
              examples:
                SingleOrderCreation:
                  description: >-
                    Response contains the identifiable information for the
                    customer to link the order in Sendcloud with the order in
                    the shop system
                  value:
                    data:
                      - id: 664
                        order_id: '555413'
                        order_number: OXSDFGHTD-12
                BatchOrderCreation:
                  description: >-
                    Response contains the identifiable information for the
                    customer to link the order in Sendcloud with the order in
                    the shop system
                  value:
                    data:
                      - id: 669
                        order_id: '555413'
                        order_number: OXSDFGHTD-12
                      - id: 1337
                        order_id: '555414'
                        order_number: OXSDFGHTD-13
        '400':
          description: >-
            Bad Request - Validation errors or business rule violations.


            **Error Response Structure**


            All errors use JSON Pointer notation in the `source.pointer` field
            to indicate the exact location of the problem:


            - `[N]` indicates which order in the batch array (0-indexed)

            - The path after shows the field hierarchy within that order

            - **Example**: `/data/attributes/[1]/order_details/integration`
            means the error is in the second order's integration field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                WrongPayloadFormatRequested:
                  summary: Wrong payload format
                  description: The request body is not in the expected array format
                  value:
                    errors:
                      - status: '400'
                        code: non_field_errors
                        title: Wrong format
                        detail: Wrong request format, expected list of objects
                MissingRequiredField:
                  summary: Missing required field
                  description: >-
                    An order in the batch is missing a required field. The array
                    index [1] indicates the second order in the batch
                    (0-indexed) has the error.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Field required
                        source:
                          pointer: /data/attributes/[1]/order_details/integration
                MissingOrderId:
                  summary: Missing order ID
                  description: >-
                    An order in the batch is missing the required `order_id`
                    field.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Field required
                        source:
                          pointer: /data/attributes/[0]/order_id
                InvalidFieldValue:
                  summary: Invalid field value
                  description: >-
                    An order has an invalid field value, such as a negative
                    quantity or invalid enum value.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Input should be greater than 0
                        source:
                          pointer: >-
                            /data/attributes/[0]/order_details/order_items/0/quantity
                DuplicateOrderProcessing:
                  summary: Duplicate order being processed
                  description: >-
                    The batch contains an `order_id` that is currently being
                    processed by another request. This triggers a transaction
                    rollback - the entire batch is rejected and zero orders are
                    created. Wait a moment and retry the entire batch.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: >-
                          We are still processing a previous request. Please try
                          again in a moment.
                        source:
                          pointer: /data
                BatchSizeLimitExceeded:
                  summary: Batch size limit exceeded
                  description: >-
                    The request contains more than 100 orders. The maximum batch
                    size is 100 orders per request.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Orders list should have at most 100 items, not 101
                        source:
                          pointer: /data/attributes/
                MultipleValidationErrors:
                  summary: Multiple validation errors
                  description: >-
                    Multiple fields have validation errors. All errors are
                    returned together to help fix all issues at once.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Field required
                        source:
                          pointer: >-
                            /data/attributes/[0]/shipping_details/ship_with/properties
                      - status: '400'
                        code: invalid
                        detail: Field required
                        source:
                          pointer: /data/attributes/[0]/shipping_details/ship_with/type
                IntegrationNotFound:
                  summary: Integration not found
                  description: >-
                    The specified integration ID does not exist or does not
                    belong to your account.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Integration with id 99999 does not exist
                        source:
                          pointer: /data/attributes/[0]/order_details/integration/id
                ImmutableFieldChange:
                  summary: Immutable field change attempted
                  description: >-
                    When updating an existing order (upsert), certain fields
                    like `order_id` cannot be changed. This error occurs when
                    trying to modify an immutable field.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Order id abc-123 cannot be changed
                        source:
                          pointer: /data/attributes/[0]/order_id
                InvalidIdType:
                  summary: Invalid id field type
                  description: >-
                    The Sendcloud `id` field has a type mismatch between
                    requests and responses.


                    - In **responses**, `id` is returned as an **integer**
                    (e.g., `"id": 669`)

                    - In **requests**, `id` must be sent as a **string** (e.g.,
                    `"id": "669"`)


                    This error occurs when you send the `id` as an integer
                    instead of a string.
                  value:
                    errors:
                      - status: '400'
                        code: invalid
                        detail: Input should be a valid string
                        source:
                          pointer: /data/attributes/[0]/id
      operationId: sc-public-v3-orders-post-create_orders
      security:
        - HTTPBasicAuth: []
        - OAuth2ClientCreds: []
      tags:
        - Orders
    get:
      summary: Retrieve a list of orders
      description: >-
        Get a list of orders filtered by integration, order number, order ID,
        order status, creation date, and update date. You can also optionally
        sort the results and pass a `cursor` value.
      x-mint:
        href: /api/v3/orders/retrieve-a-list-of-orders
        content: >-
          This endpoint lets you get a list of orders from the API in the same
          way you can find it on the Incoming Orders overview in the Sendcloud
          platform.



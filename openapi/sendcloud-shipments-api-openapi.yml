    TaxNumber:
      title: Tax Number Object
      description: Identification numbers and codes used in different contexts. These identifiers are used for taxation, customs, business registration, and other purposes, depending on the country and the specific regulatory requirements. Depending on these requirements you may need to pass one or several numbers related to sender, receiver or importer of record provider. These numbers and codes will be included into final Customs documents.
      type: object
      properties:
        name:
          type: string
          example: EORI
          description: "Tax number abbreviation\n  * VAT - Value-Added Tax → VOEC number for Norway should be shared here as advised by the [Norwegian Tax Authorities](https://www.skatteetaten.no/globalassets/bedrift-og-organisasjon/voec/sending-and-marking-goods-through-postal-services-and-transporters.pdf)\n  * EIN - Employer Identification Number\n  * GST - Goods and Service Tax\n  * SSN - Social Security Number\n  * EORI - Economic Operators Registration and Identification for the European Union\n  * DUN - Data Universal Numbering System\n  * FED - Federal Tax ID\n  * STA - State Tax ID\n  * CNP - Brazil CNPJ/CPF Federal Tax\n  * IE - Brazil type IE/RG Federal Tax\n  * INN - Russia bank details section INN\n  * KPP - Russia bank details section KPP\n  * OGR - Russia bank details section OGRN\n  * OKP - Russia bank details section OKPO\n  * IOSS - SDT or Overseas Registered Supplier or Import One-Stop-Shop or GB VAT (foreign) registration or AUSid GST Registration or VAT on E-Commerce\n  * FTZ - Free Trade Zone ID\n  * DAN - Deferment Account Duties Only\n  * TAN - Deferment Account Tax Only\n  * DTF - Deferment Account Duties, Taxes and Fees Only\n  * RGP - EU Registered Exporters Registration ID\n  * DLI - Driver's License\n  * NID - National Identity Card - A PID (Personal Identification Number) should be provided as NID (National Identity Card).\n  * PAS - Passport\n  * MID - Manufacturer ID\n  * UKIMS - UK Internal Market Scheme -> customs clearance for shipping from Great Britain to Northern Ireland under the Windsor Framework, for more information see [Windsor Framework](https://www.gov.uk/government/publications/the-windsor-framework)\n"
          enum:
          - VAT
          - EIN
          - GST
          - SSN
          - EORI
          - DUN
          - FED
          - STA
          - CNP
          - IE
          - INN
          - KPP
          - OGR
          - OKP
          - IOSS
          - FTZ
          - DAN
          - TAN
          - DTF
          - RGP
          - DLI
          - NID
          - PAS
          - MID
          - UKIMS
        country_code:
          type: string
          example: NL
          description: Issuing country code (ISO 3166-1 alpha-2 code)
          maxLength: 2
        value:
          type: string
          example: NL123456789B01
          description: Tax number itself
          maxLength: 100
      required:
      - name
      - country_code
      - value
    sync-shipment-response:
      title: Sync shipment response Object
      description: Sync shipment response object model
      allOf:
      - $ref: '#/components/schemas/base-shipment-response'
      - properties:
          parcels:
            description: Represents each package of the shipment.
            type: array
            items:
              $ref: '#/components/schemas/sync-parcels-array-response'
          label_details:
            $ref: '#/components/schemas/label-details'
      type: object
    ErrorObject:
      title: Error
      type: object
      description: Error in a JSON:API error format
      properties:
        id:
          type: string
          description: A unique identifier for the error.
        links:
          type: object
          description: A set of hyperlinks that provide additional information about the error.
          properties:
            about:
              type: string
              description: A URL that provides additional information about the error.
        status:
          type: string
          format: int32
          description: The HTTP status code of the error.
          minLength: 1
        code:
          type: string
          description: A unique error code for the error, in snake case format.
          minLength: 1
          enum:
          - unknown_field
          - invalid
          - forbidden
          - invalid_choice
          - min_value
          - 'null'
          - not_found
          - required
          - not_a_list
          - non_field_errors
          - authentication_failed
          - validation_error
          - parcel_announcement_error
        title:
          type: string
          description: A short, human-readable summary of the error.
          minLength: 1
        detail:
          type: string
          description: A human-readable explanation of the error.
          minLength: 1
        source:
          type: object
          description: An object that identifies the source of the error within the request payload.
          properties:
            pointer:
              type: string
              description: A `JSON` pointer to the location of the error within the request payload.
            parameter:
              type: string
              description: The name of the `query` parameter that caused the error.
            header:
              type: string
              description: The name of the `header` parameter that caused the error.
        meta:
          type: object
          description: Additional metadata about the error.
    shipment-request-async:
      title: Asynchronous Announcement Shipment request Object
      description: Asynchronous Shipment request object model
      type: object
      allOf:
      - $ref: '#/components/schemas/shipment-request'
      - $ref: '#/components/schemas/multicollo-parcels-array-request'
      - required:
        - parcels
    address-washer-response:
      title: Address Washer Response
      description: Address Washer Response object model
      type: object
      properties:
        input_address_is_valid:
          type: boolean
          description: Indicates if the input address is valid.
        results:
          description: The results of the address validation.
          type: array
          items:
            type: object
            properties:
              address:
                $ref: '#/components/schemas/raw-address'
              recommended:
                type: boolean
                description: Indicates if the address is recommended after validation.
              analysis:
                type: object
                description: Analysis details of the address validation.
                properties:
                  validation_result:
                    type: object
                    description: The result of the validation process.
                    properties:
                      is_valid:
                        type: boolean
                        description: Indicates if the address is valid.
                      reasons:
                        type: array
                        description: List of reasons for the validation result.
                        items:
                          type: string
                          oneOf:
                          - const: ADDRESS_TOO_LONG
                            title: address_lines:too_long
                            description: The address line exceeds the maximum length.
                          - const: HOUSE_NUMBER_TOO_LONG
                            title: house_number:too_long
                            description: The house number exceeds the maximum length.
                          - const: HOUSE_NUMBER_TOO_SHORT
                            title: house_number:too_short
                            description: The house number is too short.
                          - const: ADDRESS_NOT_VALID
                            title: address:does_not_exist
                            description: The address does not exist.
                          - const: COUNTRY_CODE_MISSING
                            title: country_code:missing
                            description: The country code is missing.
                          - const: POSTAL_CODE_MISSING
                            title: postal_code:missing
                            description: The postal code is missing.
                          - const: STATE_MISSING
                            title: state:missing
                            description: The state is missing.
                          - const: PROVINCE_MISSING
                            title: province:missing
                            description: The province is missing.
                  changed_attributes:
                    type: array
                    description: List of changed attributes.
                    items:
                      type: string
    parcel-common:
      title: Parcel common Object
      description: Parcel common object model
      type: object
      allOf:
      - $ref: '#/components/schemas/parcel-common-with-optional-fields'
      - required:
        - weight
      - type: object
        properties:
          parcel_items:
            type: array
            description: List of items/products that the parcel contains. **Note that parcel items array is required for shipments that require customs documents.**
            maxItems: 1000
            items:
              $ref: '#/components/schemas/parcel-item'
    CostsObject:
      properties:
        value:
          type:
          - string
          - 'null'
          pattern: '[\d]+(\.[\d]+)?'
          example: '3.99'
        currency:
          type:
          - string
          - 'null'
          example: EUR
    shipment-common:
      title: Shipment common Object
      description: Shipment common object model
      type: object
      allOf:
      - $ref: '#/components/schemas/shipment-common-with-optional-fields'
      - type: object
        properties:
          customs_information:
            $ref: '#/components/schemas/customs-information'
        required:
        - ship_with
    raw-address:
      title: Raw address
      type: object
      description: Raw address object
      properties:
        address_line_1:
          type: string
          example: Stadhuisplein
          description: First line of the address
        house_number:
          type: string
          example: '50'
          description: House number of the address
        address_line_2:
          type: string
          description: Additional address information, e.g. 2nd level
          example: Apartment 17B
        postal_code:
          type: string
          example: 1013 AB
          description: Zip code of the address
          minLength: 1
        city:
          type: string
          example: Eindhoven
          description: City of the address
          minLength: 1
        po_box:
          type:
          - string
          - 'null'
          description: Code required in case of PO Box or post locker delivery
        state_province_code:
          type: string
          example: IT-RM
          description: The character state code of the customer represented as ISO 3166-2 code. This field is required for certain countries. See [international shipping](/docs/shipments/international-shipping#required-fields-for-international-shipments) for details.
        country_code:
          type: string
          example: NL
          description: The country code of the customer represented as ISO 3166-1 alpha-2
          minLength: 1
    shipment-common-with-optional-fields:
      title: Shipment common with optional fields Object
      description: Shipment common with optional fields object model
      type: object
      properties:
        brand_id:
          description: 'The `id` of the brand. Brands can be added through the [Sendcloud platform](https://app.sendcloud.com/v2/settings/brands/list) and be retrieved (alongside their `id`) from the [Retrieve a list of brands](/api/v2/brands/retrieve-a-list-of-brands) endpoint.

            '
          example: 42
          type: integer
        ship_with:
          $ref: '#/components/schemas/ship-with'
        to_address:
          $ref: '#/components/schemas/address-with-required-fields'
        order_number:
          type: string
          description: Order number generated manually or by shop system
        total_order_price:
          description: 'The value paid by the buyer for the order.

            '
          $ref: '#/components/schemas/optional-price'
        reference:
          description: 'A reference that will be stored on the Shipment and returned in your responses. This is not sent to the carrier.

            '
          type:
          - string
          - 'null'
          example: shipment-1234
        external_reference_id:
          description: 'An optional reference can be provided by the API user; if included, it must be unique across shipments of the user. Using the same reference more than once will result in a 409 HTTP status code and the associated object being returned.

            '
          type:
          - string
          - 'null'
          example: unique-value-1234
        validation_methods:
          type: array
          description: 'A list of additional address validations to apply. At present, the only supported validation service is Here, and it is used exclusively for transactional contracts. To enable this feature, contract_id must be explicitly set and must reference a transactional contract.


            When using the "Here" validation method, Sendcloud will attempt to verify and correct the provided address based on the best available match from the selected provider. For example, if you submit "city": "Amstredan", the system will automatically correct it to "city": "Amsterdam".


            If no suitable match is found, the request will return an error.


            Please note that only address components recognised by the selected provider will be kept. Any additional details included in address fields (e.g. "address_line_2": "Ring the blue doorbell") will be removed if they do not match the provider records.


            For adding delivery notes or extra instructions, use the parcels.label_notes field instead.

            '
          items:
            $ref: '#/components/schemas/address-validation-method-enum'
          example:
          - here
      required:
      - to_address
    ship-with:
      title: Ship with object
      type: object
      description: 'The ship with object can be used to define how you would like to send your shipment.


        You can use a `shipping_option_code`. This is a unique identifier that displays what carrier and what set of shipping functionalities you want to use.

        '
      examples:
      - type: shipping_option_code
        properties:
          shipping_option_code: postnl:standard/insured=3000
          contract_id: 517
      properties:
        type:
          type: string
          description: 'The way the shipping method and carrier will be selected. Nowadays the only possible value is ''shipping_option_code'', which requires client to also send the `shipping_option_code` inside properties.

            '
          enum:
          - shipping_option_code
          example: shipping_option_code
        properties:
          $ref: '#/components/schemas/shipping-option-code-properties'
      required:
      - type
      - properties
    dimension-units:
      type: string
      title: Dimensional units
      enum:
      - cm
      - mm
      - m
      - yd
      - ft
      - in
      example: mm
    CheckoutPayload:
      title: Checkout Payload Object
      type: object
      properties:
        sender_address_id:
          title: The [sender address unique identifier](../sender-addresses/openapi.yaml) associated with the order
          type: integer
          description: The sender_address_id associated with the order
        shipping_product:
          title: Shipping product
          type: object
          description: The shipping product with the associated functionalities of the order. See example payload. The `code`, `name` and `selected_functionalities` fields are **all required**. This data follows from the chosen `delivery_method` (by the end-consumer).
        delivery_method_type:
          title: Delivery method type
          type: string
          minLength: 1
          description: The type of the delivery method. Needs to be either `standard_delivery`, `nominated_day_delivery` or `same_day_delivery`.
        delivery_method_data:
          type: object
          properties:
            delivery_date:
              title: Delivery date
              type: string
              format: date-time
              description: The delivery date required by the end-consumer
            formatted_delivery_date:
              type: string
              title: Formatted delivery date
              minLength: 1
              example: February 21, 2012
            parcel_handover_date:
              title: Parcel handover date
              type: string
              format: date-time
              description: Date at which the parcel needs to be handed over to the carrier
          required:
          - delivery_date
          - formatted_delivery_date
          - parcel_handover_date
      required:
      - sender_address_id
      - shipping_product
      - delivery_method_type
    ShipmentErrorLog:
      title: Shipment create/update error log
      type: object
      properties:
        error:
          title: Error(s)
          type: object
        external_order_id:
          title: External Order ID
          type: string
        external_shipment_id:
          title: External Shipment ID
          type: string
        status:
          title: Status
          type: string
          enum:
          - error
    cancellation-status:
      title: Cancel Shipment Status Object
      type: object
      properties:
        status:
          type: string
          minLength: 1
          example: cancelled
        message:
          type: string
          minLength: 1
          example: Shipment has been cancelled
      required:
      - status
      - message
    customs-information:
      title: CustomsInformation
      type: object
      allOf:
      - $ref: '#/components/schemas/customs-information-with-optional-fields'
      - required:
        - invoice_number
        - export_reason
    parcel-item-with-optional-fields:
      title: Parcel Item with optional fields Object
      description: A single item (with optional fields) in a shipment. **Note that parcel item object is required for shipments that require customs documents.**
      type: object
      properties:
        item_id:
          type: string
          description: Order Item external ID in shop system
          example: '5552'
          minLength: 1
        description:
          type: string
          description: Description of the item
          example: T-Shirt XL
          minLength: 1
          maxLength: 255
        quantity:
          type: integer
          description: Quantity of items shipped
          minimum: 1
          example: 1
        weight:
          $ref: '#/components/schemas/weight'
        price:
          $ref: '#/components/schemas/required-price'
        hs_code:
          type: string
          description: Harmonized System Code. **This field is required if it's an international shipment**
          example: '620520'
          maxLength: 12
        origin_country:
          type: string
          description: ISO-2 code of the country where the items were originally produced. **This field is required if it's an international shipment**
          example: NL
        sku:
          type: string
          description: The SKU of the product
          example: TS1234
        product_id:
          type: string
          description: The internal ID of the product
          example: '19284'
        mid_code:
          title: MID Code
          type:
          - string
          - 'null'
          description: MID code is short for Manufacturer's Identification code and must be shown on the commercial invoice. It's used as an alternative to the full name and address of a manufacturer, shipper or exporter and is always required for U.S. formal customs entries.
          example: NLOZR92MEL
        material_content:
          title: Material Content
          type:
          - string
          - 'null'
          description: A description of materials of the order content.
          example: 100% Cotton
        intended_use:
          title: Intended Use
          type:
          - string
          - 'null'
          description: Intended use of the order contents. The intended use may be personal or commercial.
          example: Personal use
        dangerous_goods:
          $ref: '#/components/schemas/dangerous-goods'
        dds_reference:
          title: DDS Reference
          type:
          - string
          - 'null'
          description: The DDS (Due Diligence Statement) reference number associated with the item, if applicable. See EUDR system for more details.
          example: 25FIYPEK0A7573
        taric_doc_code:
          title: TARIC document code
          type:
          - string
          - 'null'
          description: TARIC document codes are specific alphanumeric codes used in EU customs declarations (Box 44) to identify required supporting documents, certificates, or conditions for a product, like health certificates (e.g., 3200), origin proofs (e.g., EUR.1), or special authorizations (e.g., C716 for due diligence) for simplified procedures, ensuring compliance with EU trade rules for various goods.
          example: Y142
        manufacturer_product_id:
          title: Manufacturer Product ID
          type:
          - string
          - 'null'
          description: A manufacturer or product supplier's unique code, assigned to an individual product.
          maxLength: 70
          example: ABC-12345
        manufacturer_product_id_std:
          title: Manufacturer Product ID (Standardized)
          type:
          - string
          - 'null'
          description: A standardized manufacturer product identifier assigned by a global industry standard body (e.g. GTIN). Provide only if one exists for the product.
          maxLength: 70
          example: 01234567890128
        properties:
          type: object
          additionalProperties: true
          description: Any custom user-defined properties of order item or product
          example:
            size: red
            color: green
      required:
      - quantity
    documents:
      title: Documents Object
      type: object
      description: Documents object for a parcel
      properties:
        type:
          type: string
          deprecated: true
          description: The type of the document. See the list below for available types.
          enum:
          - label
          - cn23
          - cp71
          - commercial-invoice
          - cn23-default
          - air-waybill
          - qr
        document_type:
          type: string
          description: The type of the document. See the list below for available types.
          enum:
          - label
          - customs-declaration
          - air-waybill
        size:
          type: string
          description: The paper size of the document.
          enum:
          - a6
          - a4
        link:
          type: string
          description: A link to the document, which allows downloading of the document in PDF, PNG and ZPL and various DPI.
    ShipmentBlobOrder:
      title: Shipment Blob Order Object
      type: object
      properties:
        address:
          title: Address
          type: string
          minLength: 1
        address_2:
          title: Address 2
          type: string
        allowed_shipping_methods:
          type: array
          items:
            type: integer
          readOnly: true
        barcode:
          title: Barcode
          type: string
          minLength: 1
          description: Barcode value of the label
          readOnly: true
        city:
          title: City
          type: string
          minLength: 1
        company_name:
          title: Company name
          type: string
        country:
          $ref: '#/components/schemas/country-codes'
        created_at:
          type: string
          title: Created at
          format: date-time
          description: Timestamp indicating when the shipment was created in the Sendcloud system
          example: '2022-05-07T15:08:12.152000Z'
        currency:
          type:
          - string
          - 'null'
          title: Currency
          minLength: 1
          description: ISO 4217 currency code
          enum:
          - EUR
          - USD
          - GBP
        customs_invoice_nr:
          type: string
          title: Customs invoice nr
          description: Your own commercial invoice number
          example: '120'
        customs_shipment_type:
          type:
          - integer
          - 'null'
          title: Customs shipment type
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          description: "Type of shipment for customs purposes:\n  - `0` - Gift\n  - `1` - Documents\n  - `2` - Commercial Goods\n  - `3` - Commercial Sample\n  - `4` - Returned Goods\n"
          minimum: 0
          maximum: 4
        email:
          title: Customer email address
          type: string
          format: email
        external_order_id:
          title: External order id
          type: string
          minLength: 1
          description: External order ID assigned by the shop system
        external_shipment_id:
          title: External shipment id
          type:
          - string
          - 'null'
          minLength: 1
          description: External shipment ID assigned by the shop system
        house_number:
          title: House number
          type: string
        integration:
          title: Integration
          type: integer
          description: Sendcloud Integration ID
          readOnly: true
        name:
          title: Name
          type: string
          minLength: 1
        order_number:
          title: Order number
          type: string
          minLength: 1
          description: Unique order number generated manualy or by the shop system
        order_status:
          $ref: '#/components/schemas/ShipmentBlobStatus'
        parcel_items:
          type:
          - array
          - 'null'
          description: List of items the parcel contains
          items:
            $ref: '#/components/schemas/ParcelItems'
        payment_status:
          $ref: '#/components/schemas/ShipmentBlobStatus'
        postal_code:
          title: Postal code
          type: string
          minLength: 1
        sender_address:
          title: Sender address
          type:
          - integer
          - 'null'
          description: ID of a sender address in the Sendcloud system
          readOnly: true
        shipment_uuid:
          type: string
          title: Shipment uuid
          minLength: 1
          format: uuid
          description: Automatically generated Sendcloud's internal ID
          readOnly: true
        shipping_method:
          type:
          - integer
          - 'null'
          title: Shipping method
          description: Foreign key indicating shipping method used
          example: 1234
        shipping_method_checkout_name:
          title: Shipping method checkout name
          type: string
          maxLength: 100
          description: Human readable shipping method name
        telephone:
          title: Telephone
          type: string
        to_post_number:
          title: To post number
          type: string
        to_service_point:
          title: To service point
          type:
          - integer
          - 'null'
        to_state:
          title: To state
          type:
          - string
          - 'null'
          minLength: 1
        total_order_value:
          title: Total order value
          type:
          - string
          - 'null'
          format: decimal
          description: The total price of an order
        updated_at:
          type: string
          title: Updated at
          format: date-time
          description: Timestamp for when the shipment was updated in the Sendcloud system
          example: '2022-05-07T15:08:12.152000Z'
        weight:
          type:
          - string
          - 'null'
          title: Weight
          format: decimal
          description: Total weight of the order. Cannot be smaler than 0.001
          example: '10.2'
          maxLength: 10
        checkout_payload:
          $ref: '#/components/schemas/CheckoutPayload'
        width:
          type:
          - string
          - 'null'
          title: Width
          description: Volumetric weight width
          format: decimal
          maxLength: 10
          example: '10.2'
        height:
          type:
          - string
          - 'null'
          title: Height
          description: Volumetric weight height
          format: decimal
          maxLength: 10
          example: '10.2'
        length:
          type:
          - string
          - 'null'
          title: Length
          description: Volumetric weight length
          format: decimal
          maxLength: 10
          example: '10.2'
        customs_details:
          $ref: '#/components/schemas/CustomsInformation'
        shipment_created_at:
          type: string
          format: date-time
          description: Timestamp indicating when the shipment was created in the shop system
          example: '2022-07-07T15:08:12.152000Z'
          readOnly: true
        shipment_updated_at:
          type: string
          format: date-time
          description: Timestamp for when the shipment was updated in the shop system
          example: '2022-07-07T15:08:12.152000Z'
          readOnly: true
      required:
      - address
      - address_2
      - city
      - company_name
      - country
      - created_at
      - currency
      - customs_invoice_nr
      - customs_shipment_type
      - email
      - external_order_id
      - external_shipment_id
      - house_number
      - name
      - order_number
      - order_status
      - parcel_items
      - payment_status
      - postal_code
      - shipping_method_checkout_name
      - telephone
      - to_post_number
      - to_service_point
      - to_state
      - updated_at
      - shipment_created_at
      - shipment_updated_at
    base-shipment-response:
      title: Base shipment response Object
      description: Base shipment response object model
      type: object
      allOf:
      - $ref: '#/components/schemas/shipment-common'
      - type: object
        required:
        - from_address
        properties:
          from_address:
            description: The sender address for the shipment.
            $ref: '#/components/schemas/address-with-required-fields'
          id:
            description: ID of the shipment (required to retrieve or cancel a specific shipment)
            type: string
            readOnly: true
          to_service_point:
            $ref: '#/components/schemas/service-point-response'
          errors:
            type: array
            items:
              $ref: '#/components/schemas/ErrorObject'
            readOnly: true
            description: This errors object will contain errors such as carrier announcement errors or validation errors.
          delivery-dates:
            $ref: '#/components/schemas/delivery-dates'
            type: object
          carrier:
            type: object
            description: Carrier used for the shipment.
            readOnly: true
            properties:
              code:
                type: string
                title: Carrier Code
                description: A carrier represented by a Sendcloud unique identifier.
                example: postnl
              name:
                type: string
                title: Carrier Name
                description: Carrier friendly name.
                example: PostNL
    shipment-request-with-rules:
      title: Asynchronous Announcement Shipment with Rules request Object
      description: Asynchronous Shipment with Rules request object model
      type: object
      allOf:
      - $ref: '#/components/schemas/shipment-request-with-optional-fields'
      - $ref: '#/components/schemas/multicollo-parcels-array-request-with-optional-fields'
      - type: object
        properties:
          apply_shipping_defaults:
            type: boolean
            description: 'When set to `true`, the "Default weight", "Preferred shipping method" and "Default export reason" [shipping defaults](https://app.sendcloud.com/v2/shipping/shipping-defaults) will be applied, if they were not provided by the request payload.


              **Note that the request payload values and shipping rules take precedence over these defaults.**'
            default: true
            example: true
          apply_shipping_rules:
            type: boolean
            description: "When set to `true`, [shipping rules](https://app.sendcloud.com/v2/shipping/rules) will be applied.\n\n<Info>\n  **Note that rules take precedence over the values provided in the request payload and over the [shipping defaults](https://app.sendcloud.com/v2/shipping/shipping-defaults).**\n  \n  For instance, if a contract is specified in one of the applicable rules for the shipment that is being requested, the contract value provided in the request payload will be ignored.\n  \n  Also keep in mind that since orders created by the API do not appear in the Sendcloud platform's Incoming Orders overview, not all shipping rules can be applied.\n</Info>"
            default: true
            example: true
          delivery_indicator:
            type: string
            description: 'Free text that is intended for applying the **Checkout Delivery Method** condition in shipping rules.


              Learn more about [Shipping rules](/docs/shipping/shipping-rules/).

              '
            example: DHL home delivery
    weight-units:
      type: string
      title: Mass Units Object
      enum:
      - kg
      - g
      - lbs
      - oz
      example: g
    sync-parcels-array-response:
      title: Sync Parcels Array Response Object
      description: Sync parcel common object model
      type: object
      allOf:
      - $ref: '#/components/schemas/parcels-array-response'
      - type: object
        properties:
          label_file:
            type:
            - string
            - 'null'
            format: byte
            description: The base64 representation of the label file. **Note that it will be returned if there is only one parcel in the shipment.**
  parameters:
    SendcloudPartnerId:
      in: header
      name: Sendcloud-Partner-Id
      description: 'If you are an official [Sendcloud Tech Partner](https://www.sendcloud.com/ecosystem/), send your unique Sendcloud Partner UUID as a request header for the system to recognize you.


        The header is not required but if it is set, the system will check it. An unknown or invalid UUID will cause a 400 error.'
      schema:
        type: string
    Cursor:
      in: query
      name: cursor
      description: "The cursor query string is used as the pivot value to filter results. If no value is provided, the first page of results will be returned. To get this value, you must encode the offset, reverse and position into a base64 string.\n\nThere are 3 possible parameters to encode:\n- `o`: Offset\n- `r`: Reverse\n- `p`: Position\n  \nFor example, `r=1&p=300` encoded as a base64 string would be `cj0xJnA9MzAw`. The query string would then be `cursor=cj0xJnA9MzAw`."
      schema:
        type: string
        example: cj0xJnA9MzAw
    cursor-parameter:
      name: cursor
      in: query
      description: "The cursor query string will be used as the pivot value to filter results. If no value is provided, the service must return the first page. The value is Base64 encoded GET parameters. example:\n  For a cursor string there are 3 possible parameters to encode:\n  - o: Offset\n  - r: Reverse\n  - p: Position\n  Combine into GET parameters. Example: r=1&p=300\n  Base 64 encoded it would become: cj0xJnA9MzAw\n  GET parameter in url would be https://some.url.com/api/endpoint/?cursor=cj0xJnA9MzAw\n"
      schema:
        type: string
        example: cj0xJnA9MzAw
  responses:
    404-Shipments:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: integer
                    description: HTTP response status code
                    example: 404
                  request:
                    type: string
                    description: Endpoint which returned the response
                  message:
                    type: string
                    description: Human readable error message
                required:
                - code
                - request
                - message
          examples:
            ShipmentNotFound:
              summary: Shipment not found
              value:
                error:
                  code: 404
                  request: api/v2/integrations/1/shipments/
                  message: No ShipmentBlob matches the given query.
            IntegrationNotFound:
              summary: Integration not found
              value:
                error:
                  code: 404
                  request: api/v2/integrations/1/shipments/
                  message: No Integration matches the given query.
  securitySchemes:
    HTTPBasicAuth:
      type: http
      description: Basic Authentication using API key and secrets is currently the main authentication mechanism.
      scheme: basic
    OAuth2ClientCreds:
      type: oauth2
      description: OAuth2 is a standardized protocol for authorization that allows users to share their private resources stored on one site with another site without having to provide their credentials. OAuth2 Client Credentials Grant workflow. This workflow is typically used for server-to-server interactions that require authorization to access specific resources.
      flows:
        clientCredentials:
          tokenUrl: https://account.sendcloud.com/oauth2/token/
          scopes:
            api: Default OAuth scope required to access Sendcloud API.

  /shipments/{id}/cancel:
    parameters:
    - schema:
        type: string
      name: id
      in: path
      required: true
      description: ID of the shipment
    post:
      tags:
      - Shipments
      summary: Cancel a shipment
      description: Use this endpoint to cancel an announced shipment, if the carrier supports cancellation.
      x-mint:
        href: /api/v3/shipments/cancel-a-shipment
        content: "You can use this endpoint to **Cancel** an announced shipment.\n\n## Cancelling a shipment\n\nWhen you **cancel** a shipment which is already announced (has shipping labels attached to it), you will still be able to find it via the `id` and the [Retrieve a shipment](/api/v3/shipments/retrieve-a-shipment) endpoint. In the Sendcloud platform, it will appear in your **Cancelled labels** overview.\n\n**Insurance Notice**: If you proceed to send a shipment that was initially cancelled, the parcel's insurance coverage will become void, and any insurance claims will not be valid for that shipment.\n\n<Warning>\n  After 42 days, it's no longer possible to cancel a shipment, even if it hasn't been sent.\n</Warning>\n\n## Conditions for label cancellation\n\nIt's not always possible to cancel a shipment whose parcel has already been announced. As a result, cancellation is not guaranteed and may be asynchronous depending on the state of the shipment parcel. When you send a cancellation request via this endpoint, the response will indicate the status of the cancellation request.\n\n<Info>\n  Each carrier will have different cancellation deadlines. Some carriers do not accept cancellation requests regardless of whether or not the label is cancelled within the deadline. You can find more information about cancellation deadlines on our [help center](https://support.sendcloud.com/hc/en-us/articles/360025143991-How-do-I-cancel-my-shipment-).\n</Info>"
      operationId: sc-public-v3-scp-post-cancel_shipment
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      responses:
        '200':
          description: 'Cancelled

            - The shipment has been cancelled if all valid conditions apply.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cancel-shipment-status'
              examples:
                Cancelled:
                  summary: Successfully Cancelled
                  value:
                    data:
                      status: cancelled
                      message: Shipment has been cancelled
        '202':
          description: 'Shipment cancellation has been queued

            - The shipment having the status of ready to send (1000) will be watched for 14 days and if nothing nothing has changed to the shipment, it will be cancelled.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cancel-shipment-status'
              examples:
                Cancelled:
                  summary: Successfully queued for cancellation
                  value:
                    data:
                      status: queued
                      message: Shipment cancellation has been queued
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                ShipmentToBeCancelledNotFound:
                  summary: Shipment not found
                  value:
                    errors:
                    - status: '404'
                      code: not_found
                      detail: Not found
        '409':
          description: 'Cancellation rejected

            - When shipment has the status of 2000 which means it is already cancelled.

            - After period of 42 days of the shipment being announced we cannot cancel it and will let you know about it through a response message.

            - When shipment has the status code (11) saying that it’s delivered it will not do anything to the shipment and your request will be rejected.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                CancellationRejected:
                  summary: Cancellation rejected
                  value:
                    errors:
                    - status: '409'
                      code: invalid
                      detail: This shipment is already being cancelled.

      in: path
      required: true
      schema:
        type: integer
      description: The id of the integration to which the shipments belong
    get:
      operationId: sc-public-v2-orders-get-retrieve_a_list_of_shipments
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      x-mint:
        href: /api/v2/integrations/retrieve-a-list-of-shipments
        content: "<Warning>\n  **API v2 is entering maintenance mode.** New users should start with API v3 to access our latest features and improved performance. Already using v2? Don't worry, your current integration remains fully functional. Read more about [maintenance mode](/docs/getting-started/api-version-guide), or check out the [migration guide for API v3](/docs/getting-started/migration-guidelines-for-api-v3).\n</Warning>\n\nNote that the orders **are not** affected by [shipping rules](https://support.sendcloud.com/hc/en-us/articles/360025143571-Automate-your-workflow-using-Sendcloud-Shipping-Rules) at the time of retrieval, unless enabled explicitly.\n\nThis endpoint is paginated, meaning that you can navigate through the `results` via the URLs provided within the `next` and `previous` fields."
      x-sendcloud-paginated: true
      x-sendcloud-paginated-discriminator: results
      description: Retrieve a list of orders that were imported from a specific webshop integration.
      parameters:
      - $ref: '#/components/parameters/cursor-parameter'
      - name: start_date
        in: query
        required: false
        description: Displays orders from the given `start_date`, including the set date. It defaults to one year ago.
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        required: false
        description: Displays orders up to the given `end_date`, including the set date. It defaults to the current date.
        schema:
          type: string
          format: date
      - name: external_order_ids
        in: query
        required: false
        description: Filters results to shipments where their `external_order_id` matches one of the user provided ones.
        schema:
          type: array
          items:
            type: string
      - name: external_shipment_ids

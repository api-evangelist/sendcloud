      properties:
        external_order_id:
          title: External Order ID
          type: string
          minLength: 1
        external_shipment_id:
          title: External Shipment ID
          type: string
          minLength: 1
        shipment_uuid:
          title: Shipment UUID
          type: string
          format: uuid
          minLength: 1
        status:
          title: Status
          type: string
          enum:
          - created
          - updated
    shipment-with-rules-response:
      title: Shipment with rules response Object
      description: Shipment response object model including applied shipping rules.
      type: object
      allOf:
      - $ref: '#/components/schemas/base-shipment-response'
      - type: object
        properties:
          parcels:
            description: Represent each package of the shipment.
            type: array
            items:
              $ref: '#/components/schemas/parcels-array-response'
          applied_shipping_rules:
            description: List of shipping rules that were applied to the shipment and the result of each rule's modifications.
            type: array
            items:
              $ref: '#/components/schemas/applied-shipping-rule'
    parcel-item:
      title: Parcel Item Object
      description: A single item in a shipment. **Note that parcel item object is required for shipments that require customs documents.**
      type: object
      allOf:
      - $ref: '#/components/schemas/parcel-item-with-optional-fields'
      - required:
        - hs_code
        - weight
        - description
        - price
    Price:
      title: Price Object
      type: object
      properties:
        value:
          type: string
          example: '12.65'
          pattern: '[\d]+(\.[\d]+)?'
        currency:
          type: string
          description: ISO 4217 currency code
          minLength: 3
          maxLength: 3
          example: USD
    customs-information-with-optional-fields:
      title: CustomsInformation with optional fields
      type:
      - object
      - 'null'
      description: Optional customs information that should be provided for international shipments. This information is used for generating customs documents.
      example:
        invoice_number: INV-123
        export_reason: commercial_goods
        export_type: private
        invoice_date: '2023-08-24'
        discount_granted:
          value: '14.99'
          currency: EUR
        freight_costs: null
        insurance_costs:
          value: '3.60'
          currency: EUR
        other_costs:
          value: '1.2'
          currency: EUR
        goods_description: Electronic components and accessories
        general_notes: 'Compliance: Goods comply with international safety standards (CE certified).'
        additional_declaration_statements:
        - With reference to the above shipment, I understate that the content is not made of leather parts of animal species protected by the Washington Convention.
        - I solemnly declare that the contents of this document represent a true and accurate account of the events as they occurred. I acknowledge my responsibility for the information presented herein and understand that any misrepresentation or falsification may result in legal consequences or other penalties as applicable.
        importer_of_record:
          name: John Doe
          company_name: ImporterCo
          address_line_1: Maple Avenue
          house_number: '123'
          postal_code: '90210'
          city: Springfield
          country_code: US
          state_province_code: US-MA
          telephone: '+15551234567'
          email: info@importer-of-record-example.com
        tax_numbers:
          sender:
          - name: VAT
            country_code: NL
            value: NL123456789B01
          - name: EORI
            country_code: NL
            value: NL123456789
          receiver:
          - name: EIN
            country_code: US
            value: '123456789'
          importer_of_record:
          - name: EIN
            country_code: US
            value: '987654321'
      properties:
        invoice_number:
          type: string
          minLength: 1
          maxLength: 40
          description: Customs invoice number.
          example: INV-123
        export_reason:
          type: string
          description: Indicates the purpose or reason behind exporting the items. This classification helps customs authorities determine the applicable regulations, taxes, and duties.
          enum:
          - gift
          - documents
          - commercial_goods
          - commercial_sample
          example: commercial_goods
        export_type:
          type: string
          description: 'Export type documentation serves to categorize international shipments into three primary classifications: Private exports, intended for personal use; Commercial B2C exports, directed towards individual consumers; and Commercial B2B exports, involving business-to-business transactions. These distinctions facilitate adherence to regulatory requirements and ensure the orderly movement of goods across international boundaries.'
          enum:
          - private
          - commercial_b2c
          - commercial_b2b
          default: commercial_b2c
          example: private
        invoice_date:
          type: string
          format: date
          description: The date when the commercial invoice for the goods was issued (ISO 8601). If not provided, the announcement date will be used by default.
        discount_granted:
          description: Shipper's granted discount amount to user.
          $ref: '#/components/schemas/optional-price'
        freight_costs:
          description: Charges associated with the transportation of the goods to their destination paid by the receiver.
          $ref: '#/components/schemas/optional-price'
        insurance_costs:
          description: The costs of insurance coverage for the goods during transit paid by the receiver.
          $ref: '#/components/schemas/optional-price'
        other_costs:
          description: Additional costs or charges associated with the shipment that are not covered by freight and insurance paid by the receiver.
          $ref: '#/components/schemas/optional-price'
        goods_description:
          type: string
          description: A description of the goods being shipped, used for customs clearance purposes. This field might not be supported by all carriers.
          maxLength: 255
          example: Electronic components and accessories
        general_notes:
          type: string
          description: Exporter or shipper can include any additional information or special instructions related to the goods being shipped. This section is used to provide details that may not be covered in other parts of the invoice but are relevant for customs clearance.
          maxLength: 500
          example: 'Compliance: Goods comply with international safety standards (CE certified).'
        additional_declaration_statements:
          type: array
          description: List of additional declaration statements. Each statement may contain specific details about the nature of the goods being shipped, their origin, or any additional information required by customs authorities. The content of an additional declaration statement can vary based on the requirements of the importing and exporting countries, as well as the nature of the goods being transported.
          maxItems: 100
          items:
            type: string
            example: With reference to the above shipment, I understate that the content is not made of leather parts of animal species protected by the Washington Convention.
            minLength: 1
            maxLength: 1024
        importer_of_record:
          type:
          - object
          - 'null'
          description: 'Importer of Record (IOR) information.


            A customs-connected record importer specializes in importing goods and managing the associated customs documentation. If not provided, the receiver''s address will be used instead.'
          properties:
            name:
              type: string
              description: Name of IOR
              minLength: 1
              maxLength: 75
            company_name:
              type: string
              description: IOR company name
              maxLength: 50
            address_line_1:
              type: string
              description: Address of IOR
              minLength: 1
              maxLength: 150
            address_line_2:
              type: string
              description: Additional address information, e.g. 2nd level
              maxLength: 150
            house_number:
              type: string
              description: IOR house number
              maxLength: 20
            city:
              type: string
              description: IOR city
              minLength: 1
              maxLength: 30
            postal_code:
              type: string
              description: IOR postal code
              minLength: 1
              maxLength: 12
            country_code:
              type: string
              description: IOR country. ISO 3166-1 alpha-2 code
              minLength: 2
              maxLength: 2
            state_province_code:
              type: string
              description: Code of the state (e.g. NY for New York) or province (e.g. RM for Rome). Destinations that require this field are USA, Canada, Italy and Australia. Format ISO-3166-2. See [international shipping](/docs/shipments/international-shipping#required-fields-for-international-shipments) for details.
              example: IT-RM
              maxLength: 14
            telephone:
              type: string
              description: IOR phone number in E.164 format
              maxLength: 20
            email:
              type: string
              description: IOR email
              maxLength: 320
          required:
          - name
          - address_line_1
          - city
          - postal_code
          - country_code
        tax_numbers:
          type: object
          description: Identification numbers and codes related to sender, received and importer of record provider.
          properties:
            sender:
              type: array
              description: Sender's list of identification number objects
              maxItems: 20
              items:
                $ref: '#/components/schemas/TaxNumber'
            receiver:
              type: array
              description: Receiver's list of identification number objects
              maxItems: 20
              items:
                $ref: '#/components/schemas/TaxNumber'
            importer_of_record:
              type: array
              description: Importer of record's list of identification number objects
              items:
                $ref: '#/components/schemas/TaxNumber'
              maxItems: 20
          required:
          - sender
          - receiver
          - importer_of_record
      required:
      - invoice_number
    status:
      title: Status Object
      type: object
      description: Status object for a parcel
      properties:
        code:
          type: string
          example: ANNOUNCING
        message:
          type: string
          example: Being announced
    shipment-request:
      title: Shipment request Object
      description: Shipment request object model
      allOf:
      - $ref: '#/components/schemas/shipment-common'
      - type: object
        required:
        - from_address
        properties:
          from_address:
            description: The sender address for the shipment. You can either provide a `sender_address_id` to reference a pre-configured sender address (with optional address field overrides), or provide all address fields directly.
            oneOf:
            - $ref: '#/components/schemas/address-with-sender-address-id'
            - $ref: '#/components/schemas/address-with-required-fields'
          to_service_point:
            $ref: '#/components/schemas/service-point-request'
          label_details:
            $ref: '#/components/schemas/label-details'
          delivery_dates:
            oneOf:
            - $ref: '#/components/schemas/delivery-dates'
            - type: 'null'
            description: Defined delivery dates. The `handover_at` date indicates when the item will be handed over to the carrier by the merchant in ISO 8601. If this date is not passed the carrier default will be used. For most carriers this is the following working day.
      type: object
    optional-price:
      title: Optional price
      anyOf:
      - type: 'null'
      - $ref: '#/components/schemas/required-price'
    required-price:
      title: Price object
      description: Price, consisting of a value and currency.
      allOf:
      - $ref: '#/components/schemas/Price'
      - type: object
        required:
        - value
        - currency
    shipment-response:
      title: Shipment response Object
      description: Shipment response object model
      type: object
      allOf:
      - $ref: '#/components/schemas/base-shipment-response'
      - type: object
        properties:
          parcels:
            description: Represent each package of the shipment.
            type: array
            items:
              $ref: '#/components/schemas/parcels-array-response'
    address-validation-method-enum:
      title: Address validation method enum
      type: string
      enum:
      - here
    service-point-request:
      title: Service Point
      description: 'Node for service point information. Use the [Retrieve a list of service points](/api/v2/service-points/retrieve-a-list-of-service-points) endpoint to find service points, or pass in the carrier''s id for the service point.


        If both the `id` and `carrier_service_point_id` are provided, the `carrier_service_point_id` will be prioritised.'
      type: object
      anyOf:
      - title: Sendcloud ID
        type: object
        properties:
          id:
            type: string
            description: The sendcloud `id` of a service point.
            example: '123'
        required:
        - id
      - title: Carrier Service Point ID
        type: object
        properties:
          carrier_service_point_id:
            type: string
            description: The carrier's id of a service point
            example: '123'
        required:
        - carrier_service_point_id
    CustomsInformation:
      type:
      - object
      - 'null'
      title: Customs Information
      description: Customs information related to this shipment
      properties:
        discount_granted:
          type:
          - object
          - 'null'
          title: Discount Granted
          description: Discount granted on the total order
          $ref: '#/components/schemas/CostsObject'
        insurance_costs:
          type:
          - object
          - 'null'
          title: Insurance Cost
          description: Amount the order is insured for
          $ref: '#/components/schemas/CostsObject'
        freight_costs:
          type:
          - object
          - 'null'
          title: Freight Cost
          description: Shipping cost of the order
          $ref: '#/components/schemas/CostsObject'
        other_costs:
          type:
          - object
          - 'null'
          title: Other Costs
          description: Any other costs (for eg, wrapping costs) associated with the order
          $ref: '#/components/schemas/CostsObject'
        tax_numbers:
          type:
          - object
          - 'null'
          title: Tax information about sender, receiver, and importer of records
          properties:
            sender:
              type: array
              title: Sender's Tax Information
              minItems: 0
              items:
                $ref: '#/components/schemas/TaxNumber_2'
            receiver:
              type: array
              title: Receiver's Tax Information
              minItems: 0
              items:
                $ref: '#/components/schemas/TaxNumber_2'
            importer_of_records:
              type: array
              title: Receiver's Tax Information
              minItems: 0
              items:
                $ref: '#/components/schemas/TaxNumber_2'
    service-point-response:
      title: Service Point
      description: Service point information returned in responses.
      type: object
      properties:
        id:
          type: string
          description: The `id` of a service point.
          example: '123'
        carrier_service_point_id:
          type: string
          description: The carrier's native id for the service point
          example: '91233'
      required:
      - id
      - carrier_service_point_id
    applied-shipping-rule:
      title: Applied shipping rule modification
      description: Represents a shipping rule that was applied to the shipment and the result of the changes it made.
      type: object
      properties:
        rule:
          type: object
          description: The shipping rule that was applied.
          properties:
            id:
              type: integer
              description: The unique identifier of the shipping rule.
              example: 315157
            name:
              type: string
              description: The name of the shipping rule.
              example: Ship with PostNL for NL
          required:
          - id
          - name
        result:
          type: object
          description: 'The changes that were applied by the shipping rule. The keys represent the fields that were modified and the values represent the new values.


            Possible keys: `additional_declaration_statements`, `box`, `change_return_fee`, `contract`, `email`, `hs_code`, `number_of_shipments`, `origin_country`, `telephone`, `sender_address`, `shipping_option_code`, `total_insured_value`, `disable_return_requests`, `weight`.'
          additionalProperties: true
          example:
            shipping_option_code: postnl:standard
      required:
      - rule
      - result
    shipment-request-with-optional-fields:
      title: Shipment request with optional fields Object
      description: Shipment request with optional fields object model
      allOf:
      - $ref: '#/components/schemas/shipment-common-with-optional-fields'
      - type: object
        properties:
          from_address:
            description: The sender address for the shipment. You can either provide a `sender_address_id` to reference a pre-configured sender address (with optional address field overrides), or provide all address fields directly.
            oneOf:
            - $ref: '#/components/schemas/address-with-sender-address-id'
            - $ref: '#/components/schemas/address-with-required-fields'
          customs_information:
            $ref: '#/components/schemas/customs-information-with-optional-fields'
      - type: object
        properties:
          to_service_point:
            $ref: '#/components/schemas/service-point-request'
      - type: object
        properties:
          label_details:
            $ref: '#/components/schemas/label-details'
          delivery_dates:
            oneOf:
            - $ref: '#/components/schemas/delivery-dates'
            - type: 'null'
            description: Defined delivery dates. The `handover_at` date indicates when the item will be handed over to the carrier by the merchant in ISO 8601. If this date is not passed the carrier default will be used. For most carriers this is the following working day.
      type: object
    ShipmentBlobStatus:
      title: Shipment Blob Status Object
      type:
      - object
      - 'null'
      properties:
        id:
          title: Id
          type: string
          minLength: 1
          description: Custom internal shop status, can be used for filtering
        message:
          title: Message
          type: string
          minLength: 1
          description: User-defined human readable status
      required:
      - id
      - message
    delivery-dates:
      title: Delivery Dates
      description: Defined delivery dates
      type:
      - object
      properties:
        handover_at:
          type:
          - string
          - 'null'
          format: date-time
          description: The date when the item will be handed over to the carrier by the merchant in ISO 8601
          example: '2025-02-27T10:00:00.555309+00:00'
        deliver_at:
          type:
          - string
          - 'null'
          format: date-time
          description: The date when the order should reach the end customer in ISO 8601
          example: '2025-03-15T10:00:00.555309+00:00'
    TaxNumber_2:
      type: object
      title: Tax Number
      properties:
        name:
          type:
          - string
          - 'null'
          title: Tax ID name
          example: VAT
        country_code:
          type:
          - string
          - 'null'
          title: The country code of the country in the address
          example: NL
        value:
          type:
          - string
          - 'null'
          title: The value of the Tax ID
          example: NL987654321B02
    str-dimensions:
      title: Dimensions
      type: object
      description: Dimensions in the specified unit
      properties:
        length:
          type: string
          description: length in specified unit
          example: '15'
        width:
          type: string
          description: width in specified unit
          example: '20.5'
        height:
          type: string
          description: height in specified unit
          example: '37'
        unit:
          $ref: '#/components/schemas/dimension-units'
      required:
      - length
      - width
      - height
      - unit
    address:
      title: Address Object
      type: object
      description: Sendcloud Address object
      properties:
        name:
          type: string
          example: John Doe
          description: Name of the person associated with the address
          minLength: 1
        company_name:
          type: string
          example: Sendcloud
          description: Name of the company associated with the address
        address_line_1:
          type: string
          example: Stadhuisplein
          description: First line of the address
        house_number:
          type: string
          example: '50'
          description: House number of the address
        address_line_2:
          type: string
          description: Additional address information, e.g. 2nd level
          example: Apartment 17B
        postal_code:
          type: string
          example: 1013 AB
          description: Zip code of the address
          minLength: 1
        city:
          type: string
          example: Eindhoven
          description: City of the address
          minLength: 1
        po_box:
          type:
          - string
          - 'null'
          description: Code required in case of PO Box or post locker delivery
        state_province_code:
          type: string
          example: IT-RM
          description: The character state code of the customer represented as ISO 3166-2 code. This field is required for certain countries. See [international shipping](/docs/shipments/international-shipping#required-fields-for-international-shipments) for details.
        country_code:
          type: string
          example: NL
          description: The country code of the customer represented as ISO 3166-1 alpha-2
          minLength: 1
        email:
          type: string
          format: email
          example: johndoe@gmail.com
          description: Email address of the person associated with the address
        phone_number:
          type: string
          example: '+319881729999'
          description: Phone number of the person associated with the address
    dangerous-goods:
      title: DangerousGoods
      type: object
      description: Hazardous materials information for items.
      properties:
        chemical_record_identifier:
          type: string
          nullable: true
          description: Chemical record identifier for the dangerous goods
        regulation_set:
          type: string
          enum:
          - IATA
          - ADR
          description: Regulation set governing the dangerous goods
        packaging_type_quantity:
          type: string
          nullable: true
          description: Quantity of packaging type
        packaging_type:
          type: string
          nullable: true
          description: Type of packaging used
        packaging_instruction_code:
          type: string
          nullable: true
          description: Packaging instruction code
        id_number:
          type: string
          nullable: true
          description: UN identification number
        class_division_number:
          type: string
          nullable: true
          description: Hazard class and division number
        quantity:
          type: string
          nullable: true
          description: Quantity of dangerous goods
        unit_of_measurement:
          type: string
          enum:
          - KG
          - G
          - L
          - ML
          description: Unit of measurement for dangerous goods quantity
        proper_shipping_name:
          type: string
          nullable: true
          description: Proper shipping name as defined by regulations
        commodity_regulated_level_code:
          type: string
          enum:
          - LQ
          - EQ
          description: Commodity regulated level code
        transportation_mode:
          type: string
          enum:
          - Highway
          - Ground
          - PAX
          - CAO
          description: Mode of transportation
        emergency_contact_name:
          type: string
          nullable: true
          description: Name of emergency contact person
        emergency_contact_phone:
          type: string
          nullable: true
          description: Phone number of emergency contact
        adr_packing_group_letter:
          type: string
          enum:
          - I
          - II
          - III
          description: ADR packing group classification
        local_proper_shipping_name:
          type: string
          nullable: true
          description: Local proper shipping name
        transport_category:
          type: string
          nullable: true
          description: Transport category for ADR regulations
        tunnel_restriction_code:
          type: string
          nullable: true
          description: Tunnel restriction code
        weight_type:
          type: string
          enum:
          - Net
          - Gross
          description: Type of weight measurement
    shipping-option-code-properties:
      title: Shipping option properties Object
      description: Contains the required properties to be sent when API client informs the shipping method and carrier to be used
      type: object
      properties:
        shipping_option_code:
          type:
          - string
          - 'null'
          description: The shipping option that will be or is used for shipping your parcel. The code can be retrieved via the [Create a list of shipping options](/api/v3/shipping-options/create-a-list-of-shipping-options) endpoint. When `ship_with.type` is set to `shipping_option_code`, this field is mandatory.
          example: postnl:standard/insured=3000
        contract_id:
          type:
          - integer
          - 'null'
          minimum: 1
          description: The selected shipping contract. If you haven't specified a contract for shipping your parcel, we will automatically select the default contract for the carrier that matches your shipping option. You can retrieve your contract IDs from the [Retrieve a list of contracts](/api/v3/contracts/retrieve-a-list-of-contracts) endpoint. Otherwise, the default direct contract will be automatically selected.
    parcel-common-with-optional-fields:
      title: Parcel common with optional fields Object
      description: Parcel common with optional fields model
      type: object
      properties:
        dimensions:
          $ref: '#/components/schemas/str-dimensions'
          description: While dimensions are optional, some carriers require them present. If this is the case, an error will be thrown.
        weight:
          $ref: '#/components/schemas/str-weight'
        additional_insured_price:
          $ref: '#/components/schemas/optional-price'
          description: Amount for which you want to add additional insurance (on top of carrier insurance) to the parcel with our insurance provider XCover. You can inure up from 2 euros to 5000 euros per shipment.
        label_notes:
          type:
          - array
          - 'null'
          description: "Custom messages printed on the shipping label. Use this field to include custom text - such as invoice numbers, product IDs, or internal reference codes - on the package's shipping label. \n\n**Note that support for label messages varies by carrier; some carriers may ignore this field or offer alternatives, such as delivery instructions, which are communicated to the carrier but not printed on the label. Some carriers may apply label notes at the shipment level rather than per individual parcel.**"
          maxItems: 255
          items:
            type: string
            example: The doorbell isn’t working
            minLength: 1
            maxLength: 255
        sscc:
          type:
          - string
          - 'null'
          minLength: 18
          maxLength: 18
          pattern: ^\d{18}$
          description: The Serial Shipping Container Code (SSCC) serves as a globally unique identifier for a logistic unit, functioning as a digital "license plate" for tracking and managing goods throughout the supply chain.
          example: 019844628346512933
        package_type:
          type:
          - string
          - 'null'
          description: The package type defines how you pack your parcels. This field is mostly only required for carriers with specific needs, such as pallet carriers. For more information, reach out to your Sendcloud contact person.
          enum:
          - package
          - euro_pallet
          - block_pallet
          - mini_pallet
          - one_way_pallet
          - tube
          - over_size_pallet
          - bundle
          - half_pallet
          - letterbox
          - null
          example: package
    multicollo-parcels-array-request-with-optional-fields:
      title: Parcels array request with optional fields Object
      description: Parcels array request with optional fields object model
      type: object
      properties:
        parcels:
          description: Represents each package of the shipment. Each carrier can have its own number of parcels limit per shipment, otherwise there is a restriction to a maximum of 50 parcels (default).
          type: array
          items:
            allOf:
            - $ref: '#/components/schemas/parcel-common-with-optional-fields'
            - type: object
              properties:
                parcel_items:
                  type: array
                  description: List of items/products that the parcel contains. **Note that parcel items array is required for shipments that require customs documents.**
                  maxItems: 1000
                  items:
                    $ref: '#/components/schemas/parcel-item-with-optional-fields'
          minItems: 1
          maxItems: 50

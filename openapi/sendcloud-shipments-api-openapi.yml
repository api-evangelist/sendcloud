    post:
      operationId: sc-public-v2-orders-post-create_a_list_of_shipments
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      x-mint:
        href: /api/v2/integrations/create-a-list-of-shipments
        content: "<Warning>\n  **API v2 is entering maintenance mode.** New users should start with API v3 to access our latest features and improved performance. Already using v2? Don't worry, your current integration remains fully functional. Read more about [maintenance mode](/docs/getting-started/api-version-guide), or check out the [migration guide for API v3](/docs/getting-started/migration-guidelines-for-api-v3).\n</Warning>\n\n<Info>\n  This endpoint is only available for official Sendcloud partners.\n</Info>\n\nThis endpoint allows you to insert shipments (or 'orders') into an API integration from your shop system, and have them appear in your Sendcloud account. Imported orders will appear in the Sendcloud platform under the **Incoming order overview** with the status \"Ready to process\". This allows you to easily generate parcels and create shipping labels via the API or directly from the Sendcloud platform. The validation for this endpoint is more relaxed, therefore we recommend this method over the [Create a parcel or parcels](/api/v2/parcels/create-a-parcel-or-parcels) endpoint for third-party integrators.\n\nThis is an **UPSERT** endpoint which attempts to be idempotent given specific fields to ensure that orders are not duplicated. If there's an existing match in our database for specific fields (`external_order_id` and `external_shipment_id`), then the shipment will be updated. The system will only update orders that have had their `updated_at` (ISO 8601 DateTime) timestamp changed.\n\nThe `external_shipment_id` field is used to split orders across multiple shipments, however, this field is not supported by all shop systems. If your shop system supports the distribution of product items within an order across multiple shipments, you can use the shipment data to create multiple entries. If your shop does not support this feature, you can set the `external_shipment_id` value to `null`.\n\nBatches are limited to 100 orders at once. This endpoint should accept most values in any of the available fields, but in the case of erroneous data, an error message will be returned directly. Your requests should almost always succeed unless the field structure is not correct."
      description: Insert shipments (or 'orders') into an API integration from your shop system, and have them appear in your Sendcloud account.
      responses:
        '200':
          description: 'List with references to created shipments, or the errors that occurred while creating the shipment.

            When a shipment can''t be created, the response will contain an entry for the object with the errors.

            This object will have a path to each field containing errors, listing the error(s) it contains.'
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                  - $ref: '#/components/schemas/ShipmentCreateUpdateLog'
                  - $ref: '#/components/schemas/ShipmentErrorLog'
              examples:
                CreateUpdateShipments:
                  summary: Create or update a list of shipments
                  value:
                  - external_order_id: '1175584'
                    external_shipment_id: '777413'
                    shipment_uuid: 6b436cb2-65a4-482c-9d25-38be7868ff00
                    status: created
                  - error:
                      checkout_payload:
                        delivery_method_data:
                          delivery_date:
                          - This field is required.
                    external_order_id: '1184635'
                    external_shipment_id: ''
                    status: error
        '400':
          description: Bad Request
        '404':
          $ref: '#/components/responses/404-Shipments'

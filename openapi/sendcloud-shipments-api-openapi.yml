    post:
      tags:
      - Shipments
      summary: Delete a shipment
      operationId: sc-public-v2-orders-post-delete_a_shipment
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      x-mint:
        href: /api/v2/integrations/delete-a-shipment
        content: "<Warning>\n  **API v2 is entering maintenance mode.** New users should start with API v3 to access our latest features and improved performance. Already using v2? Don't worry, your current integration remains fully functional. Read more about [maintenance mode](/docs/getting-started/api-version-guide), or check out the [migration guide for API v3](/docs/getting-started/migration-guidelines-for-api-v3).\n</Warning>\n\nThe `order_status` and `payment_status` fields we retrieve from integrations are not mapped in our system, meaning that orders will not be automatically updated or deleted if the values for these fields change after an order is placed.\n\nYou can delete an order by providing either a `shipment_uuid`, or a combination of the `external_order_id` and `external_shipment_id` properties."
      description: Allows you to delete a shipment from Sendcloud, e.g. if it has been canceled or deleted in your shop system.
      requestBody:
        description: You must provide either a shipment_uuid or the combination of external_order_id and external_shipment_id to this endpoint.
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                properties:
                  shipment_uuid:
                    type: string
                    format: uuid
                    description: Autogenerated Sendcloud's internal ID
                required:
                - shipment_uuid
              - type: object
                properties:
                  external_order_id:
                    type: string
                    description: External order ID assigned by shop system
                  external_shipment_id:
                    type: string
                    description: External shipment ID assigned by shop system
                required:
                - external_order_id
                - external_shipment_id
            examples:
              DeleteByUUID:
                summary: Delete a shipment (via UUID)
                value:
                  shipment_uuid: 39874b59-2a68-4a3d-8e00-aeb9e0540d00
              DeleteByOrderIdShipmentId:
                summary: Delete a shipment (via `order_id` and `shipment_id`)
                value:
                  external_order_id: '123457'
                  external_shipment_id: S00002
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      request:
                        type: string
                      message:
                        type: string
              examples:
                RequiredFieldMissing:
                  summary: Missing required fields
                  value:
                    error:
                      code: 400
                      request: api/v2/integrations/1234/shipments/delete
                      message: Missing shipment_uuid or the pair external_order_id and external_shipment_id
                invalid_uuid:
                  summary: Invalid UUID
                  value:
                    error:
                      code: 400
                      request: api/v2/integrations/1234/shipments/delete
                      message: Must be a valid UUID.
        '404':
          $ref: '#/components/responses/404-Shipments'
components:
  schemas:
    label-details:
      title: Label details Object
      description: 'Describes the format and resolution of the label.


        **Note**: If you request a label in ZPL format and the carrier supports native ZPL, then it won''t be possible to download the label in any other format later.'
      type: object
      properties:
        mime_type:
          type: string
          default: application/pdf
          enum:
          - application/pdf
          - application/zpl
          - image/png
          example: application/zpl
          description: The format of the label
        dpi:
          type: integer
          description: The resolution of the label in **dots per inch**. ZPL labels are not affected by the DPI setting, as the resolution is determined by the carrier itself. Most carriers use a resolution of 203 DPI. Zebra printers need to be configured to print at the specific DPI of the label if they have higher resolution capabilities.
          default: 72
          enum:
          - 72
          - 203
          - 300
          - 600
          example: 300
    address-with-required-fields:
      title: Address Object
      type: object
      description: Sendcloud Address object
      allOf:
      - $ref: '#/components/schemas/address'
      - required:
        - name
        - address_line_1
        - postal_code
        - city
        - country_code
    str-weight:
      title: Weight
      type: object
      description: Weight in the specified unit
      properties:
        value:
          type: string
          description: Weight value
          example: '14.5'
        unit:
          $ref: '#/components/schemas/weight-units'
      required:
      - value
      - unit
    address-with-sender-address-id:
      title: Sender Address ID
      type: object
      description: A sender address referenced by ID.
      properties:
        sender_address_id:
          description: 'The ID of a pre-configured sender address to ship from.


            A sender address can be added through the [Sendcloud platform](https://app.sendcloud.com/v2/settings/addresses/sender) and be retrieved using the [Retrieve a list of sender addresses](/api/v3/sender-addresses/retrieve-a-list-of-sender-addresses) endpoint.


            Note: if the sender address has a brand or tax numbers configured, those will be used by default. However, explicitly provided `brand_id` or `tax_numbers` in the request will always take precedence over the values from the sender address.'
          example: 192
          type: integer
      required:
      - sender_address_id
    errors:
      title: Errors
      description: A standardized format for errors in [JSON:API](https://jsonapi.org/format/#error-objects) responses.
      type: array
      items:
        allOf:
        - $ref: '#/components/schemas/ErrorObject'
        - required:
          - status
          - code
          - detail
    address-washer-request:
      title: Address Washer Request
      description: Address Washer Request object model
      type: object
      properties:
        address:
          $ref: '#/components/schemas/raw-address'
        carrier_code:
          description: The code of the carrier to be used for the address validation. Only carriers available to your account can be used.
          type: string
          example: trunkrs
        validation_methods:
          description: 'An array of optional address validation methods to be applied

            The default Sendcloud validation will always be applied.

            '
          type: array
          items:
            $ref: '#/components/schemas/address-validation-method-enum'
          example:
          - here
      required:
      - address
      - carrier_code
    parcels-array-response:
      title: Parcels Array Response Object
      description: Parcel common object model
      type: object
      allOf:
      - $ref: '#/components/schemas/parcel-common'
      - type: object
        properties:
          created_at:
            type: string
            format: date-time
            description: The timestamp of when the parcel was created
            readOnly: true
            example: '2024-09-04T12:14:36.506925Z'
          updated_at:
            type: string
            format: date-time
            description: The timestamp of when the parcel was last updated
            readOnly: true
            example: '2024-09-04T12:14:47.203107Z'
          announced_at:
            type:
            - string
            - 'null'
            description: The timestamp of when the parcel was announced to the carrier (label was created)
            format: date-time
            readOnly: true
            example: '2024-09-04T12:14:47.153985Z'
          id:
            type: integer
            description: ID of the parcel (required to retrieve a parcel document for async announcement)
            readOnly: true
          status:
            $ref: '#/components/schemas/status'
            readOnly: true
          documents:
            type: array
            uniqueItems: true
            description: An array of documents. A parcel can contain multiple documents, for instance labels and a customs form. This field returns an array of all the available documents for this parcel.
            readOnly: true
            items:
              $ref: '#/components/schemas/documents'
          tracking_number:
            type: string
            description: Tracking number of the shipment.
            readOnly: true
            example: 3SYZXG8498635
          tracking_url:
            type:
            - string
            - 'null'
            description: Tracking url of this shipment.
            readOnly: true
          additional_carrier_data:
            type: object
            title: Carrier-specific data
            readOnly: true
            description: Specific data that only belongs to some carriers.
            properties:
              awb_tracking_number:
                type:
                - string
                - 'null'
                description: Deutsche Post Global Mail only. This indicates the air waybill number of this box of Global Mail parcels. This will be set once the `Finalize box` has been called.
              box_number:
                type:
                - integer
                - 'null'
                description: Deutsche Post Global Mail only. This indicates the box to which this parcel belongs. This will be only set for Global Mail parcels.
          label_notes:
            type:
            - array
            - 'null'
            description: Custom messages printed on the shipping label. Use this field to include custom text - such as invoice numbers, product IDs, or internal reference codes - on the package’s shipping label.
            maxItems: 255
            items:
              type: string
              example: The doorbell isn’t working
              minLength: 1
              maxLength: 255
    weight:
      title: Weight
      type: object
      description: Weight in the specified unit
      properties:
        value:
          type: number
          description: Weight value
          exclusiveMinimum: 0
          example: 14.5

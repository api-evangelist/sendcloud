                  request:
                    headers:
                      Cache-Control: max-age=3600
                      Content-Type: text/html; charset=utf-8
                      Connection: keep-alive
                    payload:
                      order_note:
                        note: Success
                  created_at: '2023-03-01T02:02:00+01:00'
                  exception_type: requests.exceptions.SSLError
                  exception: An SSL error occurred
  /shop-order-statuses:
    get:
      summary: Retrieve shop order statuses for an integration
      description: Fetch all available shop order statuses for the Prestashop v2 integration, in the default or selected language.
      x-mint:
        href: /api/v3/integrations/retrieve-shop-order-statuses-for-an-integration
        content: "<Warning>\n  Only the Prestashop V2 integration is supported.\n</Warning>\n\nNote that:\n\n- If the user hasn't picked a language, they will receive the status in the default language, `en-gb`.\n- If `en-gb` is not present, the user receives the status in the first language of the alphabetically ordered list."
      parameters:
      - $ref: '#/components/parameters/required_integration_id'
      - $ref: '#/components/parameters/language'
      - $ref: '#/components/parameters/show_deleted'
      responses:
        '200':
          description: All available shop order statuses for a given integration, in default or selected language.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-shop-order-statuses'
              examples:
                Response:
                  value:
                    data:
                    - external_id: 17-B
                      status: Delivered
                      deleted_at: null
                      translations:
                      - status: Delivered
                        language: en-gb
                      - status: Verzonden
                        language: nl-nl
                      - status: Geliefert
                        language: de-de
                    - external_id: 14-A
                      status: Cancelled
                      deleted_at: '2023-11-04T14:15:22Z'
                      translations:
                      - status: Cancelled
                        language: en-gb
                      - status: Geannuleerd
                        language: nl-nl
                      - status: Abgesagt
                        language: de-de
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                InvalidRequest:
                  value:
                    errors:
                    - status: '400'
                      code: non_field_errors
                      title: integration ID
                      detail: Integration ID is a required GET parameter
      operationId: sc-public-v3-integrations-get-shop_order_statuses
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      tags:
      - Integrations
    post:
      summary: Create or overwrite shop order statuses
      description: Insert shop-specific custom statuses into the Sendcloud system.
      x-mint:
        href: /api/v3/integrations/create-or-overwrite-shop-order-statuses
        content: "<Warning>\n  Only the Prestashop V2 integration is supported.\n</Warning>\n\nNote that:\n\n- Integrations can have their own custom shop statuses.\n- To get your order updates in time, Sendcloud needs to know what statuses are available.\n- This endpoint updates all existing statuses. That includes creating new statuses, changing existing ones, and deleting ones that no longer exist."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post-shop-order-statuses'
            examples:
              PostOrderShopStatuses:
                summary: Upserting available shop order statuses
                description: Setting all available shop order statuses with their available translations.
                value:
                  integration_id: 23452345
                  statuses:
                  - external_id: Send-4
                    translations:
                    - status: Sent
                      language: en-gb
                    - status: Verzonden
                      language: nl-nl
                  - external_id: '15'
                    translations:
                    - status: Delivered
                      language: en-gb
                    - status: Bezorgt
                      language: nl-nl
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: 'null'
              examples:
                Response:
                  value: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                WrongPayloadFormatRequested:
                  value:
                    errors:
                    - status: '400'
                      code: non_field_errors
                      title: Wrong format
                      detail: Wrong request format, expected object
      operationId: sc-public-v3-integrations-post-shop_order_statuses
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      tags:
      - Integrations
  /shop-order-statuses/mapping:
    get:
      summary: Retrieve custom status mapping for an integration
      description: 'Fetch a map of available shop order statuses and Sendcloud''s internal status category for the integration.

        '
      x-mint:
        href: /api/v3/integrations/retrieve-custom-status-mapping-for-an-integration
        content: "<Warning>\n  Only the Prestashop V2 integration is supported.\n</Warning>"
      parameters:
      - $ref: '#/components/parameters/required_integration_id'
      responses:
        '200':
          description: Custom status mapping for an integration.
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/get-custom-status-mapping'
              examples:
                Response:
                  value:
                    data:
                      integration_id: 23452345
                      mapping:
                      - status_category: READY_TO_SEND
                        external_id: '11'
                        is_valid: true
                      - status_category: IN_TRANSIT
                        external_id: '11'
                        is_valid: true
                      - status_category: DELIVERED
                        external_id: null
                        is_valid: true
                      - status_category: CANCEL
                        external_id: '1'
                        is_valid: false
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                InvalidRequest:
                  value:
                    errors:
                    - status: '400'
                      code: non_field_errors
                      title: integration ID
                      detail: Integration ID is a required GET parameter
      operationId: sc-public-v3-integrations-get-shop_order_statuses_mapping
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      tags:
      - Integrations
    post:
      summary: Create or update custom status mapping for an integration
      description: Upsert a map of available shop order statuses and Sendcloud's internal status category for an integration
      x-mint:
        href: /api/v3/integrations/create-or-update-custom-status-mapping-for-an-integration
        content: "<Warning>\n  Only the Prestashop V2 integration is supported.\n</Warning>"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-custom-status-mapping'
            examples:
              PostOrderStatusesMapping:
                summary: Insert or update custom status mapping of `external_ids` to Sendcloud's internal status category.
                value:
                  integration_id: 23452345
                  mapping:
                  - status_category: READY_TO_SEND
                    external_id: '11'
                  - status_category: IN_TRANSIT
                    external_id: '11'
                  - status_category: DELIVERED
                    external_id: '12'
                  - status_category: CANCEL
                    external_id: null
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: 'null'
              examples:
                Response:
                  value: null
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errors'
              examples:
                WrongPayloadFormatRequested:
                  value:
                    errors:
                    - status: '400'
                      code: non_field_errors
                      title: Wrong format
                      detail: Wrong request format, expected object
      operationId: sc-public-v3-integrations-post-shop_order_statuses_mapping
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      tags:
      - Integrations
components:
  schemas:
    IntegrationUpdate:
      title: Integration Update Object
      description: An updated integration response object
      properties:
        shop_name:
          type: string
          title: Name
          maxLength: 250
          minLength: 1
          description: Name of the shop
          example: 'Integration #1'
          readOnly: true
        shop_url:
          type: string
          title: Shop url
          description: URL of the shop the integration connects to
          format: uri
          minLength: 1
        last_updated_at:
          type: string
          title: Last updated at
          format: date-time
          description: Timestamp when the integration was last updated
          readOnly: true
        service_point_enabled:
          type: boolean
          title: Service point enabled
          description: Flag for denoting if delivery to service points is enabled
        service_point_carriers:
          type: array
          title: Service point carriers
          description: A list of carriers available for the service point picker. At least one carrier must be provided if the service point delivery is enabled.
          items:
            type: string
            example: ups
        webhook_active:
          type: boolean
          title: Webhook active
          description: Flag indicating if updates for parcels should be send via the webhook
        webhook_url:
          type: string
          title: Webhook url
          format: uri
          description: A URL to which Sendcloud communicates updates in a parcel
          minLength: 1
    errors:
      title: Errors
      type: object
      description: A standardized format for errors in JSON:API responses.
      properties:
        errors:
          type:
          - array
          - object
          items:
            type: object
            allOf:
            - $ref: '#/components/schemas/ErrorObject'
            required:
            - status
            - code
            - detail
    Integration:
      type: object
      title: Integration Object
      properties:
        id:
          type: integer
          title: ID
          description: ID of an integration
          minimum: 1
          example: 123
          readOnly: true
        shop_name:
          type: string
          title: Name
          maxLength: 250
          minLength: 1
          description: Name of the shop
          example: 'Integration #1'
          readOnly: true
        shop_url:
          type:
          - string
          - 'null'
          title: Shop url
          description: URL of the shop the integration connects to
          format: uri
          minLength: 1
        system:
          type: string
          title: System
          maxLength: 50
          minLength: 1
          example: api / amazon / magento
          description: Type of shop/system the integration connects to
          readOnly: true
        failing_since:
          type:
          - string
          - 'null'
          title: Failing since
          description: Timestamp from when the integration is failing to fetch orders or to send feedback
          format: date-time
          readOnly: true
        last_fetch:
          type:
          - string
          - 'null'
          title: Last fetch
          description: The last time we managed to fetch data from this integration, used for rate limiting purposes
          format: date-time
          readOnly: true
        last_updated_at:
          type: string
          title: Last updated at
          format: date-time
          description: Timestamp when the integration was last updated
          readOnly: true
        service_point_enabled:
          type: boolean
          title: Service point enabled
          description: Flag for denoting if delivery to service points is enabled
        service_point_carriers:
          title: Service point carriers
          type: array
          description: A list of carriers available for the service point picker
          items:
            type: string
            example: ups
          readOnly: true
        webhook_active:
          type: boolean
          title: Webhook active
          description: Flag indicating if updates for parcels should be send via the webhook
        webhook_url:
          type:
          - string
          - 'null'
          title: Webhook url
          format: uri
          description: A URL to which Sendcloud communicates updates to a parcel
          minLength: 1
      required:
      - shop_name
      - system
      - last_updated_at
    IntegrationLog:
      type:
      - object
      title: Integration Log Object
      properties:
        id:
          type:
          - integer
          title: ID
          description: ID of an log record
          minimum: 1
          example: 123
          readOnly: true
        integration_id:
          type:
          - integer
          - 'null'
          description: ID of an integration to which this log belongs
          minimum: 1
          example: 123
          writeOnly: true
        user_id:
          type:
          - integer
          description: ID of a user to which this log belongs
          minimum: 1

          properties:
            headers:
              title: HTTP headers
              description: HTTP headers which were sent within a request
              type:
              - object
              - string
              - 'null'
              examples:
              - headerExample:
                  Cache-Control: max-age=3600
                  Content-Type: text/html; charset=utf-8
                  Connection: keep-alive

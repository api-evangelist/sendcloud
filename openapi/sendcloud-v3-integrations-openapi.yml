    get-shop-order-statuses:
      title: Shop Order Statuses
      type: object
      description: Available shop order statuses with translations.
      properties:
        data:
          type: array
          description: Array holding all available shop order statuses for an integration
          items:
            type: object
            properties:
              external_id:
                type: string
                description: ID linked to the order status inside the integrated webshop.
                example: 17-B
              status:
                type: string
                description: Translated status name.
                example: Delivered
              deleted_at:
                type:
                  - string
                  - 'null'
                format: date-time
                description: Timestamp when the status got removed from available statuses.
                example: '2023-11-04T14:15:22Z'
              translations:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    status:
                      type: string
                      description: Order status.
                      example: Delivered
                    language:
                      type: string
                      description: Language of the status.
                      example: en-gb
                      enum:
                        - en-us
                        - en-gb
                        - fr-fr
                        - de-de
                        - nl-nl
                        - es-es
                        - it-it
    post-shop-order-statuses:
      title: POST Shop Order Statuses
      description: POST request with shop order statuses with translations.
      type: object
      required:
        - integration_id
        - statuses
      properties:
        integration_id:
          type: integer
          description: ID of the integration to which these statuses belong.
          example: 252345
        statuses:
          type: array
          description: Available shop statuses.
          uniqueItems: true
          minItems: 0
          items:
            type: object
            required:
              - external_id
              - translations
            properties:
              external_id:
                type: string
                description: ID linked to the order status inside the integrated webshop.
                example: 17-B
              translations:
                type: array
                minItems: 1
                maxItems: 7
                uniqueItems: true
                items:
                  type: object
                  required:
                    - status
                    - language
                  properties:
                    status:
                      type: string
                      description: Order status
                      example: Delivered
                    language:
                      type: string
                      description: Language of the status.
                      example: en-gb
                      enum:
                        - en-us
                        - en-gb
                        - fr-fr
                        - de-de
                        - nl-nl
                        - es-es
                        - it-it
    get-custom-status-mapping:
      title: Get Custom Status Mapping
      type: object
      description: >-
        Retrieve available shop order statuses mapped onto Sendcloud's internal
        status category for the given integration.
      properties:
        data:
          type: object
          properties:
            integration_id:
              type: integer
              description: Sendcloud Integration ID.
              example: 23452345
            mapping:
              type: array
              description: >-
                Array containing available shop order statuses mapped onto
                Sendcloud's internal status category.
                  - The array contains an object of each of Sendcloud's internal status categories.
                  - Each of sendcloud's internal status categories will be mapped onto either `AvailableStatus.external_id` or `null`
                  - Not all `external_ids` in AvailableStatus may be mapped onto Sendcloud's internal status category.
                  - Two `external_ids` may map onto the same internal status category.
                  - An invalid mapping is a mapping that points to `external_id` that has been deleted.
              items:
                type: object
                description: Status category to `external_id` association map.
                properties:
                  status_category:
                    type: string
                    enum:
                      - READY_TO_SEND
                      - IN_TRANSIT
                      - DELIVERED
                      - CANCEL
                    description: Sendcloud internal status category.
                    example: READY_TO_SEND
                  external_id:
                    type:
                      - string
                      - 'null'
                    description: >-
                      Field containing the ID linked to the order status inside
                      the integrated webshop. It may be `None` or `null`.
                    example: '11'
                  is_valid:
                    type: boolean
                    description: >-
                      A flag showing if the mapping points to an existing
                      `external_id`.
                    example: true
    create-custom-status-mapping:
      title: Create Custom Status Mapping
      type: object
      required:
        - integration_id
        - mapping
      description: >-
        Create or update the mapping of available shop order statuses onto
        Sendcloud's internal status category.
      properties:
        integration_id:
          type: integer
          description: Sendcloud Integration ID.
          example: 23452345
        mapping:
          type: array
          minItems: 4
          maxItems: 4
          uniqueItems: true
          description: >-
            Array containing available shop order statuses mapped onto
            Sendcloud's internal status category.
              - Create or update an existing map of available shop order statuses onto Sendcloud's internal status category for the given integration.
              - Make sure the mapping array contains objects of each Sendcloud's internal status categories.
              - Map each of Sendcloud's internal status categories onto either `AvailableStatus.external_id` or `None`.
              - Note that two `external_ids` may map to the same internal status category.
          items:
            type: object
            required:
              - status_category
              - external_id
            description: status category to external_id association map
            properties:
              status_category:
                type: string
                enum:
                  - READY_TO_SEND
                  - IN_TRANSIT
                  - DELIVERED
                  - CANCEL
                description: sendcloud internal status category.
                example: READY_TO_SEND
              external_id:
                type:
                  - string
                  - 'null'
                description: >-
                  Field containing the ID linked to the order status inside the
                  integrated webshop. It may be `None`.
                example: '11'

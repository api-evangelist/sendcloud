        '404':
          description: Not Found
      operationId: sc-public-v2-scp-get-return_portal_url
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      x-mint:
        href: /api/v2/parcels/retrieve-a-return-portal-url
        content: "<Warning>\n  **API v2 is entering maintenance mode.** New users should start with API v3 to access our latest features and improved performance. Already using v2? Don't worry, your current integration remains fully functional. Read more about [maintenance mode](/docs/getting-started/api-version-guide), or check out the [migration guide for API v3](/docs/getting-started/migration-guidelines-for-api-v3).\n</Warning>\n\nThe URL which is retrieved will link directly to the parcel in the Sendcloud Return portal, so a **return parcel** can be created immediately based on the outgoing shipment.\n\nIf no Return portal is configured, or if no brand is connected to the parcel, this endpoint will return an error response with a 404 status code."
      description: Check which of your branded return portals is associated with a specific parcel using the parcel's `id`.

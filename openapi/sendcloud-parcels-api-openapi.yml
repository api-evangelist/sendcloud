          outbound_carrier_name: UPS
      properties:
        customs_invoice_nr:
          type: string
          description: Customs invoice number
          example: INV-123
        customs_shipment_type:
          type: integer
          description: "Customs shipment type\n  * `0` - Gift\n  * `1` - Documents\n  * `2` - Commercial Goods\n  * `3` - Commercial Sample\n  * `4` - Returned Goods\n"
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          example: 2
        export_type:
          type: string
          description: 'Export type documentation serves to categorize international shipments into three primary classifications: Private exports, intended for personal use; Commercial B2C exports, directed towards individual consumers; and Commercial B2B exports, involving business-to-business transactions. These distinctions facilitate adherence to regulatory requirements and ensure the orderly movement of goods across international boundaries.'
          enum:
          - private
          - commercial_b2c
          - commercial_b2b
          default: commercial_b2c
          example: private
        invoice_date:
          type: string
          format: date
          description: The date when the commercial invoice for the goods was issued (ISO 8601). If not provided, the announcement date will be used by default.
        discount_granted:
          type: string
          description: Shipper's granted discount amount to user.
          example: '14.99'
        freight_costs:
          type: string
          description: Charges associated with the transportation of the goods to their destination paid by the receiver.
          example: '4.65'
        insurance_costs:
          type: string
          description: The costs of insurance coverage for the goods during transit paid by the receiver.
          example: '3.60'
        other_costs:
          type: string
          description: Additional costs or charges associated with the shipment that are not covered by freight and insurance paid by the receiver.
          example: '1.20'
        general_notes:
          type: string
          description: Exporter or shipper can include any additional information or special instructions related to the goods being shipped. This section is used to provide details that may not be covered in other parts of the invoice but are relevant for customs clearance.
          maxLength: 500
          example: 'Compliance: Goods comply with international safety standards (CE certified).'
        additional_declaration_statements:
          type: array
          description: List of additional declaration statements. Each statement may contain specific details about the nature of the goods being shipped, their origin, or any additional information required by customs authorities. The content of an additional declaration statement can vary based on the requirements of the importing and exporting countries, as well as the nature of the goods being transported.
          maxItems: 100
          items:
            type: string
            example: With reference to the above shipment, I understate that the content is not made of leather parts of animal species protected by the Washington Convention.
            maxLength: 1024
        importer_of_record:
          type: object
          description: 'Importer of Record (IOR) information.


            A customs-connected record importer specializes in importing goods and managing the associated customs documentation. If not provided, the receiver''s address will be used instead.'
          properties:
            name:
              type: string
              description: Name of IOR
              maxLength: 75
            company_name:
              type: string
              description: IOR company name
              maxLength: 50
            address_1:
              type: string
              description: Address of IOR
              maxLength: 150
            address_2:
              type: string
              description: Additional address information, e.g. 2nd level
              maxLength: 150
            house_number:
              type: string
              description: IOR house number
              maxLength: 20
            city:
              type: string
              description: IOR city
              maxLength: 30
            postal_code:
              type: string
              description: IOR postal code
              maxLength: 12
            country_code:
              type: string
              description: IOR country. ISO 3166-1 alpha-2 code
              maxLength: 2
            country_state:
              type: string
              description: Code of the state (e.g. NY for New York) or province (e.g. RM for Rome). Destinations that require this field are USA, Canada, Italy and Australia. Format ISO-3166-2.
              example: IT-RM
              maxLength: 14
            telephone:
              type: string
              description: IOR phone number in E.164 format
              maxLength: 20
            email:
              type: string
              description: IOR email
              maxLength: 320
          required:
          - name
          - address_1
          - city
          - postal_code
          - country_code
        tax_numbers:
          type: object
          description: Identification numbers and codes related to sender, receiver and importer of record provider.
          properties:
            sender:
              type: array
              description: Sender's list of identification number objects
              maxItems: 100
              items:
                $ref: '#/components/schemas/TaxNumber'
            receiver:
              type: array
              description: Receiver's list of identification number objects
              maxItems: 100
              items:
                $ref: '#/components/schemas/TaxNumber'
            importer_of_record:
              type: array
              description: Importer of record's list of identification number objects
              maxItems: 100
              items:
                $ref: '#/components/schemas/TaxNumber'
          required:
          - sender
          - receiver
          - importer_of_record
        return_data:
          type: object
          description: Additional information that should be provided for return parcels.
          properties:
            return_postal_code:
              type: string
              maxLength: 12
              description: The Postcode of the customer to whom the parcel was originally shipped.
            outbound_tracking_number:
              type: string
              description: Tracking number of outbound shipment
              example: BE123456789
              maxLength: 40
            outbound_shipment_date:
              type: string
              format: date
              description: Data of outbound shipment
              example: '2020-11-27'
            outbound_carrier_name:
              type: string
              description: The name of the carrier used for outbound shipment
              example: DHL
              maxLength: 50
      required:
      - customs_invoice_nr
      - customs_shipment_type

      parameters: []
  /parcels/{id}/cancel:
    parameters:
    - schema:
        type: string
      name: id
      in: path
      required: true
      description: ID of the parcel
    post:
      tags:
      - Parcels
      summary: Cancel a parcel
      operationId: sc-public-v2-scp-post-cancel_specific
      security:
      - HTTPBasicAuth: []
      - OAuth2ClientCreds: []
      x-mint:
        href: /api/v2/parcels/cancel-a-parcel
        content: "<Warning>\n  **API v2 is entering maintenance mode.** New users should start with API v3 to access our latest features and improved performance. Already using v2? Don't worry, your current integration remains fully functional. Read more about [maintenance mode](/docs/getting-started/api-version-guide), or check out the [migration guide for API v3](/docs/getting-started/migration-guidelines-for-api-v3).\n</Warning>\n\nYou can use this endpoint to:\n\n1. **Cancel** an announced parcel; or,\n2. **Delete** an unannounced parcel\n\n## Cancelling a parcel\nWhen you **cancel** a parcel which has already been announced (has a shipping label attached to it), you will still be able to find it via the `parcel_id` and the [Retrieve a parcel](/api/v2/parcels/retrieve-a-parcel) endpoint. In the Sendcloud platform, it will appear in your **Cancelled labels** overview.\n\n**Insurance Notice**: If you proceed to ship a parcel that was initially cancelled, the parcel's insurance coverage will become void, and any insurance claims will not be valid for that shipment.\n\n<Warning>\n  After 42 days, it's no longer possible to cancel a parcel, even if it hasn't been shipped.\n</Warning>\n\n### Conditions for label cancellation\n\nIt's not always possible to cancel a parcel which has already been announced. As a result, cancellation is not guaranteed and may be asynchronous depending on the state of the parcel. When you send a cancellation request via this endpoint, the response will indicate the status of the cancellation request.\n\n<Info>\n  Each carrier has different cancellation deadlines. Some carriers do not accept cancellation requests regardless of whether or not the label is cancelled within the deadline. You can find more information about cancellation deadlines in our [help center](https://support.sendcloud.com/hc/en-us/articles/360025143991-How-do-I-cancel-my-shipment-).\n</Info>\n\n## Deleting a parcel\n\nWhen you **delete** a parcel which hasn't been announced, the parcel will be removed from the Sendcloud system and you will no longer be able to locate it via the parcel `id`. You will need to create the parcel again if you want to announce it at a later date."
      responses:
        '200':
          description: 'Cancelled

            - The parcel has been cancelled if all valid conditions apply.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelParcelStatus'
              examples:
                Cancelled:
                  summary: Successfully Cancelled
                  value:
                    status: cancelled
                    message: Parcel has been cancelled
        '202':
          description: 'Parcel cancelation has been queued

            - The parcel having the status of ready to send (1000) will be watched for 14 days and if nothing nothing has changed to the parcel, it will be cancelled.'
        '400':
          description: 'Cancellation rejected

            - When parcel has the status of 2000 which means it is already cancelled.

            - After period of 42 days of the parcel being announced we cannot cancel it and will let you know about it through a response message.

            - When parcel has the status ode (11) saying that it’s delivered it will not do anything to the parcel and your request will be rejected.'
        '404':
          description: Not Found
        '410':
          description: 'Deleted

            - Happens when the parcel announcement has failed, the parcel status contains id of 1002 and you try to cancel it.'
      description: Cancel an announced parcel (if supported by the carrier) or delete an unannounced parcel.
  /parcels/{id}/return_portal_url:

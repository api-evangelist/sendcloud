          type: string
          nullable: true
          description: A reference to be assigned to this parcel. Must be unique across parcels. This field is used to create idempotence.
        reference:
          type: string
          nullable: true
          description: A reference to be assigned to this parcel. Multiple parcels can have the same reference.
          default: '0'
        to_service_point:
          type: integer
          description: ID of the selected service point
        total_insured_value:
          type: integer
          description: "This field is mutually exclusive with the `insured_value`. Amount of total insurance to add. \nThis must be a positive value, larger than 2. If a value between 0 and 2 is sent, it is rounded up to 2.\nThe maximum insurance is 5000 plus your shipping method’s insurance depending on the carrier. \nThis field works by automatically calculating how much Sendcloud Insurance you’d need to add plus your shipping method’s insurance so it matches the exact value you’ve given. \nAs an example, DPD insures all their shipments by 520€ by default. \nIf you pass the `total_insured_value`: 5000 your shipment will have a total insurance coverage of 5000€, but you’re only paying for 4480€. <br><br>\nNote: this value is an integer. If decimal numbers are sent, these are rounded up to the nearest whole number.\nExample: sending 72.35 results in a `total_insured_value` of 73. <br><br>\nNote: For multicollo shipments, where the `quantity` is greater than 1, the specified insurance amount applies per parcel, not to the shipment as a whole.\nFor example, if you ship 5 parcels and set the `insured_value` to 500 EUR/GBP, each parcel will be insured for 500 EUR/GBP. This results in a total shipment coverage of 5 x 500 = 2500 EUR/GBP.\n"
        shipment_uuid:
          type: string
          description: Unique identifier that we assign to your shipment within the Sendcloud system.
        parcel_items:
          type: array
          description: List of items the order contains. Check the structure of a parcel_item in the “Parcel_items” section (remember, it’s a list of them!).
          items:
            $ref: '#/components/schemas/parcel-item'
        is_return:
          type: boolean
          description: Set to true if this parcel is a return
        length:
          type: string
          description: Parcel length in centimeters (will be used for volumetric weight calculation)
        width:
          type: string
          description: Parcel width in centimeters (will be used for volumetric weight calculation)
        height:
          type: string
          description: 'Parcel height in centimeters (will be used for volumetric weight calculation). Note: You must provide length, width and height all at once for calculating volumetric weight or passing them as-is to carriers that require these properties

            Parcel height in centimeters (will be used for volumetric weight calculation). Note: You must provide length, width and height all at once for calculating volumetric weight or passing them as-is to carriers that require these properties'
        request_label_async:
          type: boolean
          description: Makes sure that the label is requested asynchronously. The parcel is returned, but without label. You will need to poll for status changes on the parcel.
        apply_shipping_rules:
          type: boolean
          description: When set to True configured shipping rules will be applied before creating the label and announcing the Parcel
        from_name:
          type: string
          description: Name of the sender (when creating a return parcel)
        from_company_name:
          type: string
          description: Company name of the sender the parcel will be shipped from (when creating a return parcel)
        from_address_1:
          type: string
          description: Address of the sender (when creating a return parcel)
        from_address_2:
          type: string
          description: Additional address information of the sender (when creating a return parcel)
        from_house_number:
          type: string
          description: House number of the sender (when creating a return parcel)
        from_city:
          type: string
          description: City of the sender (when creating a return parcel)
        from_postal_code:
          type: string
          description: Zip code of the sender
        from_country:
          type: string
          description: Country of the sender (when creating a return parcel)
        from_telephone:
          type: string
          description: Phone number of the sender (when creating a return parcel)
        from_email:
          type: string
          description: E-mail address of the sender (when creating a return parcel)
        from_vat_number:
          type: string
          description: VAT number of the sender (when creating a return parcel). Deprecated in favor of the `customs_information` object.
        from_eori_number:
          type: string
          description: EORI number of the sender (when creating a return parcel). Deprecated in favor of the `customs_information` object.
          deprecated: true
        from_inbound_vat_number:
          type: string
          description: GB VAT number - needed for shipments from Europe to GB (when creating a return parcel). Deprecated in favor of the `customs_information` object.
          deprecated: true
        from_inbound_eori_number:
          type: string
          description: GB EORI number - needed for shipments from Europe to GB (when creating a return parcel). Deprecated in favor of the `customs_information` object.
          deprecated: true
        from_ioss_number:
          type: string
          description: IOSS(Import One-Stop Shop) number of the sender (when creating a return parcel). Deprecated in favor of the `customs_information` object.
          deprecated: true
        customs_information:
          $ref: '#/components/schemas/ParcelCustomsInformation'

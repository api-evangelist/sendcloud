                      reference: some_reference_123
                CreateParcels:
                  summary: Create multiple parcels with verbose errors
                  value:
                    failed_parcels:
                    - parcel:
                        id: 5
                        name: John Doe
                        company_name: Sendcloud
                        address_divided:
                          street: Stadhuisplein 10
                          house_number: ''
                        city: Eindhoven
